<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="8" fill="#F0F4FF"/>
  <!-- Anatomical plate (T-shaped / contoured) -->
  <path d="M130 80 Q200 75 270 80 L280 90 Q285 100 280 110 L260 115 Q200 120 140 115 L120 110 Q115 100 120 90 Z" fill="url(#apGrad)" stroke="#64748B" stroke-width="1.5"/>
  <!-- Shaft portion -->
  <rect x="170" y="115" width="60" height="100" rx="6" fill="url(#apGrad2)" stroke="#64748B" stroke-width="1.5"/>
  <!-- Screw holes in head -->
  <circle cx="160" cy="97" r="5" fill="#E2E8F0" stroke="#64748B" stroke-width="1"/>
  <circle cx="200" cy="95" r="5" fill="#E2E8F0" stroke="#64748B" stroke-width="1"/>
  <circle cx="240" cy="97" r="5" fill="#E2E8F0" stroke="#64748B" stroke-width="1"/>
  <!-- Screw holes in shaft -->
  <circle cx="200" cy="135" r="5" fill="#E2E8F0" stroke="#64748B" stroke-width="1"/>
  <circle cx="200" cy="160" r="5" fill="#E2E8F0" stroke="#64748B" stroke-width="1"/>
  <circle cx="200" cy="185" r="5" fill="#E2E8F0" stroke="#64748B" stroke-width="1"/>
  <circle cx="200" cy="205" r="5" fill="#E2E8F0" stroke="#64748B" stroke-width="1"/>
  <!-- Bone outline -->
  <path d="M110 70 Q200 50 290 70 L300 100 Q290 140 240 130 L240 220 Q250 260 230 280 L170 280 Q150 260 160 220 L160 130 Q110 140 100 100 Z" fill="none" stroke="#D4A574" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="200" y="248" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#475569">Anatomical Plate</text>
  <text x="200" y="268" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8">Pre-contoured Periarticular Design</text>
  <defs>
    <linearGradient id="apGrad" x1="120" y1="80" x2="120" y2="115"><stop offset="0%" stop-color="#CBD5E1"/><stop offset="100%" stop-color="#94A3B8"/></linearGradient>
    <linearGradient id="apGrad2" x1="170" y1="115" x2="170" y2="215"><stop offset="0%" stop-color="#94A3B8"/><stop offset="100%" stop-color="#CBD5E1"/></linearGradient>
  </defs>
</svg>