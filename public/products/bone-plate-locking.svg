<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="8" fill="#F0F4FF"/>
  <!-- Locking plate with threaded holes -->
  <rect x="50" y="95" width="300" height="28" rx="5" fill="url(#lpGrad)"/>
  <!-- Combination holes (DCU + threaded) -->
  <g>
    <circle cx="95" cy="109" r="6" fill="#E2E8F0" stroke="#475569" stroke-width="1.2"/>
    <circle cx="95" cy="109" r="3" fill="none" stroke="#475569" stroke-width="0.5" stroke-dasharray="1 1"/>
    <ellipse cx="135" cy="109" rx="8" ry="6" fill="#E2E8F0" stroke="#475569" stroke-width="1.2"/>
    <circle cx="175" cy="109" r="6" fill="#E2E8F0" stroke="#475569" stroke-width="1.2"/>
    <circle cx="175" cy="109" r="3" fill="none" stroke="#475569" stroke-width="0.5" stroke-dasharray="1 1"/>
    <ellipse cx="215" cy="109" rx="8" ry="6" fill="#E2E8F0" stroke="#475569" stroke-width="1.2"/>
    <circle cx="255" cy="109" r="6" fill="#E2E8F0" stroke="#475569" stroke-width="1.2"/>
    <circle cx="255" cy="109" r="3" fill="none" stroke="#475569" stroke-width="0.5" stroke-dasharray="1 1"/>
    <circle cx="305" cy="109" r="6" fill="#E2E8F0" stroke="#475569" stroke-width="1.2"/>
    <circle cx="305" cy="109" r="3" fill="none" stroke="#475569" stroke-width="0.5" stroke-dasharray="1 1"/>
  </g>
  <!-- Locking screws (angular stable) -->
  <line x1="95" y1="123" x2="90" y2="168" stroke="#475569" stroke-width="2"/>
  <line x1="175" y1="123" x2="170" y2="168" stroke="#475569" stroke-width="2"/>
  <line x1="255" y1="123" x2="260" y2="168" stroke="#475569" stroke-width="2"/>
  <line x1="305" y1="123" x2="310" y2="168" stroke="#475569" stroke-width="2"/>
  <!-- Bone -->
  <rect x="55" y="135" width="130" height="55" rx="14" fill="#FDE8D0" stroke="#D4A574" stroke-width="1"/>
  <rect x="215" y="135" width="130" height="55" rx="14" fill="#FDE8D0" stroke="#D4A574" stroke-width="1"/>
  <!-- Fracture -->
  <path d="M190 135 L198 162 L188 190" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="3 3"/>
  <!-- Angular stability arrows -->
  <path d="M80 85 L95 95" stroke="#3B82F6" stroke-width="1" marker-end="url(#arr)"/>
  <path d="M320 85 L305 95" stroke="#3B82F6" stroke-width="1" marker-end="url(#arr)"/>
  <text x="80" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#3B82F6">Angular stable</text>
  <text x="320" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#3B82F6">Locking</text>
  <text x="200" y="248" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#475569">Locking Compression Plate</text>
  <text x="200" y="268" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8">Angular Stable — Internal Fixator</text>
  <defs>
    <linearGradient id="lpGrad" x1="50" y1="95" x2="50" y2="123">
      <stop offset="0%" stop-color="#D1D5DB"/>
      <stop offset="100%" stop-color="#9CA3AF"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 6 6" refX="6" refY="3" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#3B82F6"/></marker>
  </defs>
</svg>