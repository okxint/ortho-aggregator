<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="8" fill="#F0F4FF"/>
  <rect x="40" y="100" width="320" height="24" rx="4" fill="#94A3B8" stroke="#64748B" stroke-width="1.5"/>
  <rect x="40" y="100" width="320" height="24" rx="4" fill="url(#plateGrad)"/>
  <!-- Screw holes -->
  <circle cx="80" cy="112" r="7" fill="#E2E8F0" stroke="#64748B" stroke-width="1.5"/>
  <circle cx="120" cy="112" r="7" fill="#E2E8F0" stroke="#64748B" stroke-width="1.5"/>
  <circle cx="160" cy="112" r="7" fill="#E2E8F0" stroke="#64748B" stroke-width="1.5"/>
  <circle cx="200" cy="112" r="7" fill="#E2E8F0" stroke="#64748B" stroke-width="1.5"/>
  <circle cx="240" cy="112" r="7" fill="#E2E8F0" stroke="#64748B" stroke-width="1.5"/>
  <circle cx="280" cy="112" r="7" fill="#E2E8F0" stroke="#64748B" stroke-width="1.5"/>
  <circle cx="320" cy="112" r="7" fill="#E2E8F0" stroke="#64748B" stroke-width="1.5"/>
  <!-- Bone representation -->
  <rect x="60" y="140" width="120" height="60" rx="12" fill="#FDE8D0" stroke="#D4A574" stroke-width="1" stroke-dasharray="4 2"/>
  <rect x="220" y="140" width="120" height="60" rx="12" fill="#FDE8D0" stroke="#D4A574" stroke-width="1" stroke-dasharray="4 2"/>
  <!-- Fracture line -->
  <path d="M185 140 L195 170 L185 200" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="3 3"/>
  <!-- Screws into bone -->
  <line x1="120" y1="124" x2="120" y2="160" stroke="#475569" stroke-width="2"/>
  <line x1="160" y1="124" x2="160" y2="160" stroke="#475569" stroke-width="2"/>
  <line x1="240" y1="124" x2="240" y2="160" stroke="#475569" stroke-width="2"/>
  <line x1="280" y1="124" x2="280" y2="160" stroke="#475569" stroke-width="2"/>
  <!-- Label -->
  <text x="200" y="250" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#475569">Bone Plate — Fracture Fixation</text>
  <text x="200" y="270" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8">Surgical Grade SS 316L / Titanium</text>
  <defs>
    <linearGradient id="plateGrad" x1="40" y1="100" x2="40" y2="124">
      <stop offset="0%" stop-color="#CBD5E1"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
  </defs>
</svg>