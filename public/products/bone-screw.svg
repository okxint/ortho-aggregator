    <linearGradient id="screwGrad2" x1="240" y1="0" x2="256" y2="0"><stop offset="0%" stop-color="#B0BEC5"/><stop offset="50%" stop-color="#CFD8DC"/><stop offset="100%" stop-color="#90A4AE"/></linearGradient>
  </defs>
