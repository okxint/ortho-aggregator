  <text x="148" y="274" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Cortical</text>
  <text x="248" y="274" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Cannulated</text>
  <text x="200" y="294" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8">Surgical Grade — Multiple Sizes</text>
  <defs>
