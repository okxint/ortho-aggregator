  <path d="M160 75 L156 80 L160 85 L156 90 L160 95 L156 100 L160 105 L156 110 L160 115 L156 120 L160 125 L156 130 L160 135 L156 140 L160 145 L156 150 L160 155 L156 160 L160 165 L156 170 L160 175 L156 180 L160 185 L156 190 L160 195 L156 200 L160 205 L156 210 L160 215 L156 220 L160 225 L156 230" stroke="#64748B" stroke-width="1" fill="none"/>
