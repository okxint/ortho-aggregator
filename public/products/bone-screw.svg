  <rect x="240" y="60" width="16" height="180" rx="2" fill="url(#screwGrad2)"/>
  <!-- Cannulation (hollow core) -->
  <line x1="248" y1="55" x2="248" y2="240" stroke="#E2E8F0" stroke-width="3"/>
  <!-- Thread - wider pitch (cancellous) -->
  <path d="M232 80 L240 90 L232 100 L240 110 L232 120 L240 130 L232 140 L240 150 L232 160 L240 170 L232 180 L240 190 L232 200 L240 210 L232 220 L240 230" stroke="#64748B" stroke-width="1" fill="none"/>
