<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="8" fill="#F0FDF4"/>
  <!-- Tibia/bone outline -->
  <rect x="175" y="20" width="50" height="260" rx="15" fill="#FDE8D0" stroke="#D4A574" stroke-width="1" stroke-dasharray="4 2" opacity="0.5"/>
  <!-- Fracture -->
  <path d="M175 140 L200 148 L225 140" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="3 3"/>
  <!-- Ilizarov rings -->
  <ellipse cx="200" cy="60" rx="100" ry="16" fill="none" stroke="#475569" stroke-width="3"/>
  <ellipse cx="200" cy="120" rx="100" ry="16" fill="none" stroke="#475569" stroke-width="3"/>
  <ellipse cx="200" cy="180" rx="100" ry="16" fill="none" stroke="#475569" stroke-width="3"/>
  <ellipse cx="200" cy="240" rx="100" ry="16" fill="none" stroke="#475569" stroke-width="3"/>
  <!-- Threaded rods connecting rings -->
  <line x1="110" y1="60" x2="110" y2="240" stroke="#94A3B8" stroke-width="2"/>
  <line x1="290" y1="60" x2="290" y2="240" stroke="#94A3B8" stroke-width="2"/>
  <line x1="140" y1="72" x2="140" y2="228" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="260" y1="72" x2="260" y2="228" stroke="#94A3B8" stroke-width="1.5"/>
  <!-- Rod thread marks -->
  <g stroke="#B0BEC5" stroke-width="0.5" opacity="0.5">
    <line x1="108" y1="80" x2="112" y2="80"/><line x1="108" y1="100" x2="112" y2="100"/>
    <line x1="108" y1="120" x2="112" y2="120"/><line x1="108" y1="140" x2="112" y2="140"/>
    <line x1="108" y1="160" x2="112" y2="160"/><line x1="108" y1="180" x2="112" y2="180"/>
    <line x1="108" y1="200" x2="112" y2="200"/><line x1="108" y1="220" x2="112" y2="220"/>
  </g>
  <!-- Wires through bone -->
  <line x1="100" y1="55" x2="300" y2="65" stroke="#F59E0B" stroke-width="1.2"/>
  <line x1="100" y1="65" x2="300" y2="55" stroke="#F59E0B" stroke-width="1.2"/>
  <line x1="100" y1="115" x2="300" y2="125" stroke="#F59E0B" stroke-width="1.2"/>
  <line x1="100" y1="125" x2="300" y2="115" stroke="#F59E0B" stroke-width="1.2"/>
  <line x1="100" y1="175" x2="300" y2="185" stroke="#F59E0B" stroke-width="1.2"/>
  <line x1="100" y1="185" x2="300" y2="175" stroke="#F59E0B" stroke-width="1.2"/>
  <line x1="100" y1="235" x2="300" y2="245" stroke="#F59E0B" stroke-width="1.2"/>
  <line x1="100" y1="245" x2="300" y2="235" stroke="#F59E0B" stroke-width="1.2"/>
  <!-- Nuts on rods -->
  <rect x="106" y="73" width="8" height="5" rx="1" fill="#64748B"/>
  <rect x="106" y="162" width="8" height="5" rx="1" fill="#64748B"/>
  <rect x="286" y="73" width="8" height="5" rx="1" fill="#64748B"/>
  <rect x="286" y="162" width="8" height="5" rx="1" fill="#64748B"/>
  <text x="200" y="288" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#475569">Ilizarov External Fixator</text>
</svg>