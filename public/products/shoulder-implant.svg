<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="8" fill="#F0F9FF"/>
  <!-- Scapula/Glenoid outline -->
  <path d="M120 50 Q80 100 90 150 Q85 200 120 230 L160 200 Q170 150 160 100 Z" fill="none" stroke="#D4A574" stroke-width="1" stroke-dasharray="4 2" opacity="0.5"/>
  <!-- Glenoid baseplate -->
  <ellipse cx="155" cy="140" rx="20" ry="30" fill="#94A3B8" stroke="#64748B" stroke-width="1.5"/>
  <!-- Glenosphere (reverse) -->
  <circle cx="172" cy="140" r="22" fill="url(#gsGrad)" stroke="#64748B" stroke-width="1.5"/>
  <ellipse cx="168" cy="135" rx="6" ry="4" fill="white" opacity="0.2"/>
  <!-- Humeral socket (poly) -->
  <path d="M190 120 Q195 110 210 108 L220 108 Q235 110 240 120 L242 145 Q240 165 235 170 L220 172 L210 172 L195 170 Q190 165 188 145 Z" fill="#E8E8E8" stroke="#9CA3AF" stroke-width="1"/>
  <!-- Humeral cup articulation -->
  <path d="M192 135 Q200 120 220 118 Q235 120 238 135" fill="none" stroke="#9CA3AF" stroke-width="0.5"/>
  <!-- Humeral stem -->
  <path d="M208 172 L210 265 Q215 275 220 265 L222 172" fill="url(#hStemGrad)" stroke="#64748B" stroke-width="1.5"/>
  <!-- Humerus outline -->
  <path d="M195 170 L198 265 Q215 285 232 265 L235 170" fill="none" stroke="#D4A574" stroke-width="1" stroke-dasharray="4 2" opacity="0.5"/>
  <!-- Labels -->
  <line x1="155" y1="105" x2="80" y2="85" stroke="#9CA3AF" stroke-width="0.5"/>
  <text x="30" y="88" font-family="system-ui,sans-serif" font-size="8" fill="#64748B">Baseplate</text>
  <line x1="190" y1="140" x2="280" y2="120" stroke="#9CA3AF" stroke-width="0.5"/>
  <text x="285" y="123" font-family="system-ui,sans-serif" font-size="8" fill="#64748B">Glenosphere</text>
  <line x1="240" y1="150" x2="280" y2="150" stroke="#9CA3AF" stroke-width="0.5"/>
  <text x="285" y="153" font-family="system-ui,sans-serif" font-size="8" fill="#64748B">Humeral Cup</text>
  <line x1="225" y1="220" x2="280" y2="220" stroke="#9CA3AF" stroke-width="0.5"/>
  <text x="285" y="223" font-family="system-ui,sans-serif" font-size="8" fill="#64748B">Stem</text>
  <text x="200" y="294" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#94A3B8">Reverse Shoulder Prosthesis</text>
  <defs>
    <linearGradient id="gsGrad" cx="0.4" cy="0.4" r="0.6"><stop offset="0%" stop-color="#CFD8DC"/><stop offset="100%" stop-color="#78909C"/></linearGradient>
    <linearGradient id="hStemGrad" x1="208" y1="0" x2="222" y2="0"><stop offset="0%" stop-color="#B0BEC5"/><stop offset="50%" stop-color="#E0E0E0"/><stop offset="100%" stop-color="#90A4AE"/></linearGradient>
  </defs>
</svg>