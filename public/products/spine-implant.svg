<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="8" fill="#FEF2F2"/>
  <!-- Vertebral bodies -->
  <rect x="140" y="30" width="120" height="50" rx="8" fill="#FDE8D0" stroke="#D4A574" stroke-width="1"/>
  <rect x="140" y="90" width="120" height="50" rx="8" fill="#FDE8D0" stroke="#D4A574" stroke-width="1"/>
  <rect x="140" y="150" width="120" height="50" rx="8" fill="#FDE8D0" stroke="#D4A574" stroke-width="1"/>
  <rect x="140" y="210" width="120" height="50" rx="8" fill="#FDE8D0" stroke="#D4A574" stroke-width="1"/>
  <!-- Disc spaces -->
  <rect x="150" y="80" width="100" height="10" rx="4" fill="#B3E5FC" opacity="0.5"/>
  <rect x="150" y="140" width="100" height="10" rx="4" fill="#B3E5FC" opacity="0.5"/>
  <rect x="150" y="200" width="100" height="10" rx="4" fill="#B3E5FC" opacity="0.5"/>
  <!-- Pedicle screws (left side) -->
  <line x1="90" y1="50" x2="145" y2="55" stroke="#475569" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="90" y1="110" x2="145" y2="115" stroke="#475569" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="90" y1="170" x2="145" y2="175" stroke="#475569" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="90" y1="230" x2="145" y2="235" stroke="#475569" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Screw heads (left) -->
  <circle cx="85" cy="50" r="6" fill="#94A3B8" stroke="#64748B" stroke-width="1.5"/>
  <circle cx="85" cy="110" r="6" fill="#94A3B8" stroke="#64748B" stroke-width="1.5"/>
  <circle cx="85" cy="170" r="6" fill="#94A3B8" stroke="#64748B" stroke-width="1.5"/>
  <circle cx="85" cy="230" r="6" fill="#94A3B8" stroke="#64748B" stroke-width="1.5"/>
  <!-- Rod (left) -->
  <line x1="85" y1="50" x2="85" y2="230" stroke="url(#rodGrad)" stroke-width="5" stroke-linecap="round"/>
  <!-- Pedicle screws (right side) -->
  <line x1="310" y1="50" x2="255" y2="55" stroke="#475569" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="310" y1="110" x2="255" y2="115" stroke="#475569" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="310" y1="170" x2="255" y2="175" stroke="#475569" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="310" y1="230" x2="255" y2="235" stroke="#475569" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Screw heads (right) -->
  <circle cx="315" cy="50" r="6" fill="#94A3B8" stroke="#64748B" stroke-width="1.5"/>
  <circle cx="315" cy="110" r="6" fill="#94A3B8" stroke="#64748B" stroke-width="1.5"/>
  <circle cx="315" cy="170" r="6" fill="#94A3B8" stroke="#64748B" stroke-width="1.5"/>
  <circle cx="315" cy="230" r="6" fill="#94A3B8" stroke="#64748B" stroke-width="1.5"/>
  <!-- Rod (right) -->
  <line x1="315" y1="50" x2="315" y2="230" stroke="url(#rodGrad)" stroke-width="5" stroke-linecap="round"/>
  <!-- Cross-link -->
  <line x1="85" y1="140" x2="315" y2="140" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  <!-- Interbody cage -->
  <rect x="165" y="142" width="70" height="8" rx="2" fill="#E8D5B7" stroke="#B08968" stroke-width="1"/>
  <text x="200" y="149" text-anchor="middle" font-family="system-ui,sans-serif" font-size="6" fill="#8D6E63">CAGE</text>
  <text x="200" y="285" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#475569">Spinal Fixation System</text>
  <text x="200" y="298" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#94A3B8">Pedicle Screws + Rods + Cage</text>
  <defs>
    <linearGradient id="rodGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#78909C"/><stop offset="50%" stop-color="#CFD8DC"/><stop offset="100%" stop-color="#78909C"/></linearGradient>
  </defs>
</svg>