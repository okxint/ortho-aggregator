<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="280" y2="200"><stop offset="0%" stop-color="#F0FDF4"/><stop offset="100%" stop-color="#DCFCE7"/></linearGradient>
  </defs>
  <rect width="280" height="200" rx="12" fill="url(#bg2)"/>
  <!-- Bone -->
  <rect x="60" y="100" width="160" height="40" rx="10" fill="#F5E6D3" stroke="#D4A574" stroke-width="1.5"/>
  <!-- Drill hole -->
  <circle cx="140" cy="120" r="4" fill="#8B5E3C" stroke="#6B4226" stroke-width="1"/>
  <!-- Drill bit -->
  <g transform="translate(140, 120) rotate(-15)">
    <rect x="-2" y="-80" width="4" height="60" rx="1" fill="#94A3B8"/>
    <!-- Flutes -->
    <path d="M-2 -20 L2 -25 M-2 -30 L2 -35 M-2 -40 L2 -45 M-2 -50 L2 -55 M-2 -60 L2 -65" stroke="#64748B" stroke-width="0.8"/>
    <!-- Tip -->
    <path d="M-2 -20 L0 -15 L2 -20" fill="#475569"/>
  </g>
  <!-- Power drill body -->
  <g transform="translate(128, 38) rotate(-15)">
    <rect x="0" y="0" width="24" height="14" rx="4" fill="#475569"/>
    <rect x="4" y="-18" width="16" height="22" rx="3" fill="#374151"/>
    <rect x="7" y="-14" width="10" height="6" rx="2" fill="#22C55E" opacity="0.6"/>
    <!-- Trigger -->
    <path d="M8 14 L8 22 Q8 26 12 26 L14 26 Q18 26 18 22 L18 14" fill="#374151"/>
  </g>
  <!-- Depth gauge -->
  <g transform="translate(200, 75)">
    <rect x="0" y="0" width="3" height="50" fill="#94A3B8"/>
    <rect x="-4" y="15" width="11" height="3" rx="1" fill="#64748B"/>
    <text x="18" y="20" font-family="system-ui,sans-serif" font-size="7" fill="#6B7280">Depth</text>
    <text x="18" y="30" font-family="system-ui,sans-serif" font-size="7" fill="#6B7280">Gauge</text>
  </g>
  <!-- Drill sleeve / guide -->
  <rect x="136" y="85" width="8" height="15" rx="2" fill="#CBD5E1" stroke="#94A3B8" stroke-width="1"/>
  <rect x="70" y="160" width="140" height="26" rx="8" fill="white" fill-opacity="0.9"/>
  <text x="140" y="177" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#166534">Drilling &amp; Measurement</text>
</svg>