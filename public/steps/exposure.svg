<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="280" y2="200"><stop offset="0%" stop-color="#EFF6FF"/><stop offset="100%" stop-color="#DBEAFE"/></linearGradient>
    <linearGradient id="skin" x1="0" y1="60" x2="0" y2="160"><stop offset="0%" stop-color="#FDDCB5"/><stop offset="100%" stop-color="#F5C89A"/></linearGradient>
  </defs>
  <rect width="280" height="200" rx="12" fill="url(#bg1)"/>
  <!-- Skin layers -->
  <rect x="30" y="70" width="220" height="80" rx="8" fill="url(#skin)"/>
  <!-- Incision line -->
  <line x1="80" y1="70" x2="200" y2="70" stroke="#DC2626" stroke-width="2"/>
  <!-- Retractors -->
  <path d="M85 70 L75 45 L70 45" stroke="#64748B" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M195 70 L205 45 L210 45" stroke="#64748B" stroke-width="3" fill="none" stroke-linecap="round"/>
  <rect x="62" y="42" width="16" height="6" rx="2" fill="#94A3B8"/>
  <rect x="202" y="42" width="16" height="6" rx="2" fill="#94A3B8"/>
  <!-- Exposed bone -->
  <rect x="90" y="95" width="100" height="30" rx="8" fill="#F5E6D3" stroke="#D4A574" stroke-width="1.5"/>
  <!-- Fracture line -->
  <path d="M140 95 L143 110 L137 120 L140 125" stroke="#EF4444" stroke-width="2"/>
  <!-- Scalpel -->
  <g transform="translate(220, 140) rotate(-30)">
    <rect x="0" y="0" width="6" height="35" rx="2" fill="#94A3B8"/>
    <path d="M0 0 L3 -15 L6 0" fill="#CBD5E1" stroke="#64748B" stroke-width="0.8"/>
  </g>
  <!-- Label -->
  <rect x="70" y="160" width="140" height="26" rx="8" fill="white" fill-opacity="0.9"/>
  <text x="140" y="177" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#1E40AF">Surgical Exposure</text>
</svg>