<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="280" y2="200"><stop offset="0%" stop-color="#F5F3FF"/><stop offset="100%" stop-color="#EDE9FE"/></linearGradient>
  </defs>
  <rect width="280" height="200" rx="12" fill="url(#bg5)"/>
  <!-- C-arm outline -->
  <path d="M60 30 Q30 30 30 60 L30 140 Q30 170 60 170" stroke="#64748B" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- C-arm source (top) -->
  <rect x="55" y="22" width="30" height="16" rx="4" fill="#475569"/>
  <!-- C-arm detector (bottom) -->
  <rect x="55" y="162" width="30" height="16" rx="4" fill="#475569"/>
  <!-- X-ray beam -->
  <path d="M70 38 L60 60 L80 60 Z" fill="#7C3AED" opacity="0.1"/>
  <path d="M70 38 L50 162 M70 38 L90 162" stroke="#7C3AED" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.3"/>
  <!-- Monitor/screen -->
  <rect x="120" y="25" width="140" height="105" rx="8" fill="#1E293B" stroke="#475569" stroke-width="2"/>
  <rect x="126" y="31" width="128" height="88" rx="4" fill="#0F172A"/>
  <!-- X-ray image on screen -->
  <!-- Bone outline (x-ray look) -->
  <rect x="145" y="50" width="90" height="20" rx="6" fill="none" stroke="#38BDF8" stroke-width="1.5" opacity="0.7"/>
  <!-- Plate on x-ray -->
  <rect x="150" y="44" width="80" height="6" rx="2" fill="#38BDF8" opacity="0.8"/>
  <!-- Screws on x-ray -->
  <line x1="165" y1="50" x2="165" y2="70" stroke="#38BDF8" stroke-width="2" opacity="0.9"/>
  <line x1="180" y1="50" x2="180" y2="70" stroke="#38BDF8" stroke-width="2" opacity="0.9"/>
  <line x1="200" y1="50" x2="200" y2="70" stroke="#38BDF8" stroke-width="2" opacity="0.9"/>
  <line x1="215" y1="50" x2="215" y2="70" stroke="#38BDF8" stroke-width="2" opacity="0.9"/>
  <!-- Second view (lateral) -->
  <text x="150" y="90" font-family="system-ui,sans-serif" font-size="7" fill="#38BDF8" opacity="0.6">AP VIEW</text>
  <rect x="145" y="95" width="90" height="18" rx="6" fill="none" stroke="#38BDF8" stroke-width="1" opacity="0.5"/>
  <rect x="150" y="90" width="80" height="5" rx="1.5" fill="#38BDF8" opacity="0.5"/>
  <text x="190" y="112" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#38BDF8" opacity="0.6">LATERAL</text>
  <!-- Monitor stand -->
  <rect x="180" y="130" width="20" height="15" fill="#475569"/>
  <rect x="165" y="145" width="50" height="4" rx="2" fill="#64748B"/>
  <rect x="70" y="160" width="140" height="26" rx="8" fill="white" fill-opacity="0.9"/>
  <text x="140" y="177" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#6D28D9">Fluoroscopy Check</text>
</svg>