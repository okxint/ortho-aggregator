<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <defs>
    <linearGradient id="bgRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a1a2a"/>
      <stop offset="100%" stop-color="#8a3040"/>
    </linearGradient>
    <linearGradient id="boneA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="100%" stop-color="#e8d4a8"/>
    </linearGradient>
    <linearGradient id="reamerMetal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a8b0b8"/>
      <stop offset="50%" stop-color="#d0d8e0"/>
      <stop offset="100%" stop-color="#9098a0"/>
    </linearGradient>
    <linearGradient id="cartilage" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0a0a0"/>
      <stop offset="100%" stop-color="#c08080"/>
    </linearGradient>
    <radialGradient id="acetabDepth" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a1a10"/>
      <stop offset="70%" stop-color="#6a3020"/>
      <stop offset="100%" stop-color="#c08060"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="280" height="200" fill="url(#bgRed)" rx="4"/>

  <!-- Title -->
  <text x="140" y="16" text-anchor="middle" fill="#ffc0c0" font-family="Arial, sans-serif" font-size="9" font-weight="bold">ACETABULAR REAMING</text>

  <!-- Pelvis - anterior-lateral view showing acetabulum -->
  <path d="M 20,35 Q 40,25 80,28 Q 110,30 130,40 Q 145,50 150,65 Q 155,80 150,100 Q 145,115 135,125 Q 120,135 100,135 Q 80,133 65,120 Q 50,105 38,85 Q 28,65 22,48 Z" fill="url(#boneA)" stroke="#b89a6a" stroke-width="0.8"/>

  <!-- Iliac crest -->
  <path d="M 22,36 Q 45,26 80,29 Q 108,31 128,39" fill="none" stroke="#d4b88a" stroke-width="1.5"/>
  <text x="55" y="24" text-anchor="middle" fill="#ffd0b0" font-family="Arial, sans-serif" font-size="6">iliac crest</text>

  <!-- Obturator foramen -->
  <ellipse cx="88" cy="140" rx="14" ry="18" fill="#4a1a2a" stroke="#b89a6a" stroke-width="0.5"/>
  <text x="88" y="165" text-anchor="middle" fill="#d0a0a0" font-family="Arial, sans-serif" font-size="5">obturator foramen</text>

  <!-- Ischium -->
  <path d="M 100,135 Q 108,145 110,160 Q 108,172 100,178 Q 88,180 78,172 Q 72,162 72,148 Q 75,138 80,133" fill="url(#boneA)" stroke="#b89a6a" stroke-width="0.7"/>

  <!-- Acetabulum - exposed, opened up -->
  <ellipse cx="120" cy="95" rx="26" ry="25" fill="url(#acetabDepth)" stroke="#b89a6a" stroke-width="0.8"/>

  <!-- Acetabular rim -->
  <ellipse cx="120" cy="95" rx="26" ry="25" fill="none" stroke="#d4b88a" stroke-width="1.2"/>

  <!-- Residual cartilage fragments being removed -->
  <path d="M 100,82 Q 105,78 112,80" fill="none" stroke="#c08080" stroke-width="1.5" opacity="0.7"/>
  <path d="M 138,85 Q 142,90 140,96" fill="none" stroke="#c08080" stroke-width="1.5" opacity="0.7"/>
  <path d="M 108,112 Q 114,116 122,114" fill="none" stroke="#c08080" stroke-width="1.5" opacity="0.6"/>

  <!-- Cartilage debris -->
  <circle cx="102" cy="78" r="1.5" fill="#c08080" opacity="0.6"/>
  <circle cx="141" cy="83" r="1" fill="#c08080" opacity="0.5"/>
  <circle cx="106" cy="115" r="1.2" fill="#c08080" opacity="0.5"/>

  <!-- Acetabular reamer - hemispherical -->
  <path d="M 98,80 A 24,24 0 0,1 142,80" fill="none" stroke="url(#reamerMetal)" stroke-width="2"/>
  <path d="M 98,80 A 24,24 0 0,1 142,80 A 24,24 0 0,1 98,80 Z" fill="url(#reamerMetal)" opacity="0.3"/>

  <!-- Reamer teeth/cutting surface -->
  <path d="M 100,82 L 103,88 M 106,78 L 108,84 M 112,76 L 114,82 M 118,75 L 120,81 M 124,76 L 126,82 M 130,78 L 132,84 M 136,82 L 138,88" fill="none" stroke="#808890" stroke-width="0.8"/>

  <!-- Reamer hemisphere body -->
  <path d="M 98,80 Q 100,90 105,98 Q 112,108 120,112 Q 128,108 135,98 Q 140,90 142,80" fill="url(#reamerMetal)" opacity="0.5" stroke="#707880" stroke-width="0.5"/>

  <!-- Reamer shaft -->
  <line x1="120" y1="75" x2="195" y2="30" stroke="#b0b8c0" stroke-width="3"/>
  <line x1="120" y1="75" x2="195" y2="30" stroke="#d0d8e0" stroke-width="1.5"/>

  <!-- Reamer handle/chuck -->
  <rect x="190" y="22" width="35" height="16" rx="3" fill="#606870" stroke="#505860" stroke-width="0.7"/>
  <rect x="195" y="25" width="25" height="10" rx="2" fill="#707880" stroke="#808890" stroke-width="0.4"/>
  <!-- T-handle -->
  <line x1="207" y1="22" x2="207" y2="15" stroke="#606870" stroke-width="2.5"/>
  <line x1="198" y1="15" x2="216" y2="15" stroke="#606870" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Rotation arrows -->
  <path d="M 130,72 A 12,12 0 0,1 110,72" fill="none" stroke="#ffdd80" stroke-width="0.8" marker-end="url(#arrowY)"/>
  <defs>
    <marker id="arrowY" markerWidth="4" markerHeight="4" refX="3" refY="2" orient="auto">
      <path d="M 0,0 L 4,2 L 0,4 Z" fill="#ffdd80"/>
    </marker>
  </defs>
  <text x="120" y="68" text-anchor="middle" fill="#ffdd80" font-family="Arial, sans-serif" font-size="5">rotation</text>

  <!-- Femur retracted (dislocated, shown off to the side) -->
  <path d="M 175,110 Q 178,120 180,135 Q 182,155 183,180 L 193,180 Q 192,155 190,135 Q 188,120 186,110 Z" fill="url(#boneA)" stroke="#b89a6a" stroke-width="0.7" opacity="0.6"/>
  <!-- Femoral neck osteotomy cut -->
  <path d="M 174,110 Q 177,105 180,103 Q 183,105 186,110" fill="url(#boneA)" stroke="#b89a6a" stroke-width="0.7" opacity="0.6"/>
  <line x1="174" y1="110" x2="186" y2="110" stroke="#cc4444" stroke-width="0.8" stroke-dasharray="2,1"/>
  <text x="180" y="100" text-anchor="middle" fill="#d0a0a0" font-family="Arial, sans-serif" font-size="5" opacity="0.7">femur (retracted)</text>

  <!-- Femoral head removed - shown separately -->
  <circle cx="225" cy="80" r="13" fill="url(#boneA)" stroke="#b89a6a" stroke-width="0.7" opacity="0.5"/>
  <text x="225" y="100" text-anchor="middle" fill="#d0a0a0" font-family="Arial, sans-serif" font-size="5" opacity="0.7">femoral head</text>
  <text x="225" y="107" text-anchor="middle" fill="#d0a0a0" font-family="Arial, sans-serif" font-size="5" opacity="0.7">(excised)</text>

  <!-- Bone debris from reaming -->
  <circle cx="95" cy="75" r="0.8" fill="#e8d4a8" opacity="0.6"/>
  <circle cx="143" cy="78" r="0.6" fill="#e8d4a8" opacity="0.5"/>
  <circle cx="92" cy="92" r="0.7" fill="#e8d4a8" opacity="0.5"/>
  <circle cx="145" cy="95" r="0.9" fill="#e8d4a8" opacity="0.4"/>

  <!-- Labels -->
  <line x1="120" y1="95" x2="55" y2="95" stroke="#ffc0c0" stroke-width="0.3"/>
  <text x="10" y="93" fill="#ffc0c0" font-family="Arial, sans-serif" font-size="6">acetabulum</text>

  <line x1="120" y1="75" x2="155" y2="55" stroke="#c0d0e0" stroke-width="0.3"/>
  <text x="157" y="55" fill="#c0d0e0" font-family="Arial, sans-serif" font-size="6">reamer</text>

  <text x="120" y="130" text-anchor="middle" fill="#ffa0a0" font-family="Arial, sans-serif" font-size="5.5">acetabular floor</text>

  <!-- Orientation -->
  <text x="10" y="195" fill="#d09090" font-family="Arial, sans-serif" font-size="6">Lateral View</text>
  <text x="10" y="185" fill="#d09090" font-family="Arial, sans-serif" font-size="5">S</text>
  <text x="10" y="175" fill="#a07070" font-family="Arial, sans-serif" font-size="5">I</text>
  <line x1="12" y1="182" x2="12" y2="176" stroke="#a07070" stroke-width="0.5" marker-end="url(#arrowO2)"/>
  <defs>
    <marker id="arrowO2" markerWidth="3" markerHeight="3" refX="2" refY="1.5" orient="auto">
      <path d="M 0,0 L 3,1.5 L 0,3 Z" fill="#d09090"/>
    </marker>
  </defs>
</svg>