<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <defs>
    <linearGradient id="bgBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2a4f"/>
      <stop offset="100%" stop-color="#2a4a7a"/>
    </linearGradient>
    <linearGradient id="boneC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="100%" stop-color="#e8d4a8"/>
    </linearGradient>
    <linearGradient id="cupMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8d0d8"/>
      <stop offset="30%" stop-color="#e8f0f8"/>
      <stop offset="70%" stop-color="#a0a8b8"/>
      <stop offset="100%" stop-color="#808898"/>
    </linearGradient>
    <linearGradient id="impactorShaft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9098a0"/>
      <stop offset="50%" stop-color="#b0b8c0"/>
      <stop offset="100%" stop-color="#808890"/>
    </linearGradient>
    <radialGradient id="preparedAcetab" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a2018"/>
      <stop offset="60%" stop-color="#7a4030"/>
      <stop offset="100%" stop-color="#c09070"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="280" height="200" fill="url(#bgBlue)" rx="4"/>

  <!-- Title -->
  <text x="140" y="16" text-anchor="middle" fill="#a0c0f0" font-family="Arial, sans-serif" font-size="9" font-weight="bold">ACETABULAR CUP INSERTION</text>

  <!-- Pelvis -->
  <path d="M 25,38 Q 50,28 90,30 Q 120,33 140,45 Q 155,58 158,75 Q 160,90 155,108 Q 148,122 138,130 Q 122,140 102,140 Q 82,138 68,125 Q 52,110 40,90 Q 30,70 25,50 Z" fill="url(#boneC)" stroke="#b89a6a" stroke-width="0.8"/>

  <!-- Iliac crest -->
  <path d="M 27,39 Q 52,29 90,31 Q 118,34 137,44" fill="none" stroke="#d4b88a" stroke-width="1.3"/>

  <!-- Acetabulum prepared (reamed) -->
  <ellipse cx="125" cy="102" rx="26" ry="25" fill="url(#preparedAcetab)" stroke="#b89a6a" stroke-width="0.8"/>

  <!-- Ischium -->
  <path d="M 102,140 Q 110,150 112,165 Q 110,178 102,184 Q 90,186 80,178 Q 74,168 74,155 Q 78,142 82,138" fill="url(#boneC)" stroke="#b89a6a" stroke-width="0.7"/>

  <!-- Obturator foramen -->
  <ellipse cx="90" cy="147" rx="12" ry="16" fill="#1a2a4f" stroke="#b89a6a" stroke-width="0.4"/>

  <!-- Acetabular cup (metal shell) - tilted at 40-45 degrees abduction -->
  <g transform="rotate(-43, 125, 102)">
    <!-- Cup outer shell -->
    <path d="M 101,88 A 25,25 0 0,1 149,88 Q 148,100 142,110 Q 134,118 125,120 Q 116,118 108,110 Q 102,100 101,88 Z" fill="url(#cupMetal)" stroke="#707880" stroke-width="0.7"/>
    <!-- Cup rim -->
    <ellipse cx="125" cy="88" rx="24" ry="5" fill="#d0d8e0" stroke="#808890" stroke-width="0.5"/>
    <!-- Porous coating texture on outer surface -->
    <path d="M 105,95 Q 108,92 112,90" fill="none" stroke="#a0a8b0" stroke-width="0.3" opacity="0.6"/>
    <path d="M 110,105 Q 115,100 120,98" fill="none" stroke="#a0a8b0" stroke-width="0.3" opacity="0.6"/>
    <path d="M 130,98 Q 135,100 140,105" fill="none" stroke="#a0a8b0" stroke-width="0.3" opacity="0.6"/>
    <path d="M 135,92 Q 140,95 142,98" fill="none" stroke="#a0a8b0" stroke-width="0.3" opacity="0.6"/>
    <!-- Screw holes in cup -->
    <circle cx="118" cy="100" r="1.5" fill="#606870" stroke="#505860" stroke-width="0.3"/>
    <circle cx="132" cy="100" r="1.5" fill="#606870" stroke="#505860" stroke-width="0.3"/>
    <circle cx="125" cy="107" r="1.5" fill="#606870" stroke="#505860" stroke-width="0.3"/>
  </g>

  <!-- Cup impactor/inserter -->
  <!-- Impactor head (contacts the cup) -->
  <g transform="rotate(-43, 125, 102)">
    <ellipse cx="125" cy="86" rx="16" ry="4" fill="#909aa0" stroke="#707880" stroke-width="0.5"/>
  </g>

  <!-- Impactor shaft - angled upward from cup -->
  <line x1="125" y1="80" x2="210" y2="28" stroke="url(#impactorShaft)" stroke-width="4.5"/>
  <line x1="125" y1="80" x2="210" y2="28" stroke="#c0c8d0" stroke-width="2"/>

  <!-- Impact force arrow (mallet strike) -->
  <line x1="215" y1="25" x2="230" y2="15" stroke="#ff9060" stroke-width="1" marker-end="url(#arrowImp)"/>
  <line x1="220" y1="30" x2="235" y2="20" stroke="#ff9060" stroke-width="1" marker-end="url(#arrowImp)"/>
  <defs>
    <marker id="arrowImp" markerWidth="4" markerHeight="4" refX="1" refY="2" orient="auto">
      <path d="M 4,0 L 0,2 L 4,4 Z" fill="#ff9060"/>
    </marker>
  </defs>
  <text x="240" y="20" fill="#ff9060" font-family="Arial, sans-serif" font-size="5.5">mallet</text>
  <text x="240" y="27" fill="#ff9060" font-family="Arial, sans-serif" font-size="5.5">impact</text>

  <!-- Abduction angle indicator -->
  <!-- Horizontal reference line -->
  <line x1="80" y1="102" x2="170" y2="102" stroke="#80a0c0" stroke-width="0.4" stroke-dasharray="3,2" opacity="0.5"/>
  <!-- Angle arc for 40-45 degrees -->
  <path d="M 155,102 A 30,30 0 0,0 146,80" fill="none" stroke="#80c0ff" stroke-width="0.6" stroke-dasharray="2,1"/>
  <text x="162" y="90" fill="#80c0ff" font-family="Arial, sans-serif" font-size="6">40-45°</text>
  <text x="162" y="97" fill="#6090c0" font-family="Arial, sans-serif" font-size="5">abduction</text>

  <!-- Anteversion indicator (shown as rotation from sagittal) -->
  <text x="170" y="120" fill="#80c0ff" font-family="Arial, sans-serif" font-size="5">15-20° anteversion</text>
  <path d="M 148,115 Q 155,112 165,115" fill="none" stroke="#80c0ff" stroke-width="0.5"/>

  <!-- Labels -->
  <line x1="60" y1="35" x2="50" y2="28" stroke="#a0c0f0" stroke-width="0.3"/>
  <text x="48" y="26" text-anchor="end" fill="#a0c0f0" font-family="Arial, sans-serif" font-size="6">ilium</text>

  <line x1="125" y1="102" x2="45" y2="105" stroke="#a0c0f0" stroke-width="0.3"/>
  <text x="10" y="103" fill="#a0c0f0" font-family="Arial, sans-serif" font-size="6">acetabulum</text>

  <text x="125" y="145" text-anchor="middle" fill="#c0d0e0" font-family="Arial, sans-serif" font-size="6">metal shell (press-fit)</text>

  <!-- Cup detail callout -->
  <rect x="185" y="110" width="82" height="55" rx="3" fill="#1a2a4f" stroke="#405880" stroke-width="0.5" opacity="0.8"/>
  <text x="226" y="122" text-anchor="middle" fill="#a0c0f0" font-family="Arial, sans-serif" font-size="6" font-weight="bold">Cup Detail</text>
  <!-- Mini cup cross-section -->
  <path d="M 200,150 Q 210,130 226,128 Q 242,130 252,150" fill="none" stroke="#c0c8d0" stroke-width="1.5"/>
  <!-- Porous coating dots -->
  <circle cx="205" cy="145" r="0.6" fill="#a0a8b0"/>
  <circle cx="208" cy="140" r="0.6" fill="#a0a8b0"/>
  <circle cx="212" cy="136" r="0.6" fill="#a0a8b0"/>
  <circle cx="240" cy="136" r="0.6" fill="#a0a8b0"/>
  <circle cx="244" cy="140" r="0.6" fill="#a0a8b0"/>
  <circle cx="247" cy="145" r="0.6" fill="#a0a8b0"/>
  <text x="226" y="158" text-anchor="middle" fill="#8090a0" font-family="Arial, sans-serif" font-size="5">porous coating</text>
  <!-- Screw holes -->
  <circle cx="220" cy="135" r="1" fill="#405880" stroke="#607090" stroke-width="0.3"/>
  <circle cx="232" cy="135" r="1" fill="#405880" stroke="#607090" stroke-width="0.3"/>
  <text x="226" y="142" text-anchor="middle" fill="#8090a0" font-family="Arial, sans-serif" font-size="4.5">screw holes</text>

  <!-- Orientation -->
  <text x="10" y="195" fill="#6090c0" font-family="Arial, sans-serif" font-size="6">AP View</text>
</svg>