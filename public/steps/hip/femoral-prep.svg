<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <defs>
    <linearGradient id="bgGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a1a"/>
      <stop offset="100%" stop-color="#2a5a2a"/>
    </linearGradient>
    <linearGradient id="boneF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="100%" stop-color="#e8d4a8"/>
    </linearGradient>
    <linearGradient id="corticalBone" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0c8a0"/>
      <stop offset="20%" stop-color="#f5e6c8"/>
      <stop offset="80%" stop-color="#f5e6c8"/>
      <stop offset="100%" stop-color="#e0c8a0"/>
    </linearGradient>
    <linearGradient id="cancellous" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8b888"/>
      <stop offset="100%" stop-color="#c0a070"/>
    </linearGradient>
    <linearGradient id="broachMetal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#808898"/>
      <stop offset="30%" stop-color="#c0c8d8"/>
      <stop offset="70%" stop-color="#b0b8c8"/>
      <stop offset="100%" stop-color="#707888"/>
    </linearGradient>
    <linearGradient id="marrow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a05040"/>
      <stop offset="100%" stop-color="#804030"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="280" height="200" fill="url(#bgGreen)" rx="4"/>

  <!-- Title -->
  <text x="140" y="16" text-anchor="middle" fill="#a0e0a0" font-family="Arial, sans-serif" font-size="9" font-weight="bold">FEMORAL CANAL PREPARATION</text>

  <!-- Proximal femur - cross section view showing canal -->
  <!-- Outer cortex - left side -->
  <path d="M 80,40 Q 75,35 70,38 Q 62,45 55,60 Q 48,80 44,100 Q 40,120 38,145 Q 37,165 36,195" fill="url(#boneF)" stroke="#b89a6a" stroke-width="0.8"/>

  <!-- Outer cortex - right side -->
  <path d="M 120,40 Q 128,38 134,42 Q 140,50 144,65 Q 148,85 150,105 Q 152,125 153,150 Q 154,170 155,195" fill="url(#boneF)" stroke="#b89a6a" stroke-width="0.8"/>

  <!-- Greater trochanter -->
  <path d="M 120,40 Q 132,30 138,25 Q 142,22 140,30 Q 138,38 134,42" fill="url(#boneF)" stroke="#b89a6a" stroke-width="0.8"/>
  <text x="148" y="28" fill="#a0e0a0" font-family="Arial, sans-serif" font-size="6">greater trochanter</text>

  <!-- Neck osteotomy line -->
  <line x1="78" y1="38" x2="122" y2="38" stroke="#cc4444" stroke-width="1.5"/>
  <path d="M 78,36 L 78,40 M 85,36 L 85,40 M 92,36 L 92,40 M 99,36 L 99,40 M 106,36 L 106,40 M 113,36 L 113,40 M 120,36 L 120,40" fill="none" stroke="#cc4444" stroke-width="0.4"/>
  <text x="100" y="32" text-anchor="middle" fill="#ff8888" font-family="Arial, sans-serif" font-size="6">neck osteotomy</text>

  <!-- Medullary canal (cancellous bone / marrow) -->
  <path d="M 68,50 Q 65,60 62,80 Q 58,100 56,120 Q 55,140 54,165 Q 54,180 54,195 L 136,195 Q 136,180 136,165 Q 136,145 135,125 Q 134,105 132,85 Q 130,65 126,50 Z" fill="url(#cancellous)" stroke="none" opacity="0.5"/>

  <!-- Inner canal (marrow space) -->
  <path d="M 78,55 Q 76,65 73,80 Q 70,100 68,120 Q 67,140 66,160 Q 66,175 66,195 L 124,195 Q 124,175 124,160 Q 124,140 123,120 Q 122,100 120,80 Q 118,65 115,55 Z" fill="url(#marrow)" stroke="none" opacity="0.4"/>

  <!-- Broach/rasp inside the canal -->
  <g>
    <!-- Broach body - tapered wedge shape -->
    <path d="M 82,50 L 78,55 Q 76,70 74,90 Q 72,110 71,130 Q 70,145 70,160 L 120,160 Q 120,145 119,130 Q 118,110 116,90 Q 114,70 112,55 L 108,50 Z" fill="url(#broachMetal)" stroke="#606870" stroke-width="0.6"/>

    <!-- Broach cutting ridges (rasp teeth) -->
    <line x1="78" y1="60" x2="112" y2="60" stroke="#909aa0" stroke-width="0.5"/>
    <line x1="77" y1="70" x2="113" y2="70" stroke="#909aa0" stroke-width="0.5"/>
    <line x1="76" y1="80" x2="114" y2="80" stroke="#909aa0" stroke-width="0.5"/>
    <line x1="75" y1="90" x2="115" y2="90" stroke="#909aa0" stroke-width="0.5"/>
    <line x1="74" y1="100" x2="116" y2="100" stroke="#909aa0" stroke-width="0.5"/>
    <line x1="73" y1="110" x2="117" y2="110" stroke="#909aa0" stroke-width="0.5"/>
    <line x1="72" y1="120" x2="118" y2="120" stroke="#909aa0" stroke-width="0.5"/>
    <line x1="71" y1="130" x2="119" y2="130" stroke="#909aa0" stroke-width="0.5"/>
    <line x1="71" y1="140" x2="119" y2="140" stroke="#909aa0" stroke-width="0.5"/>
    <line x1="70" y1="150" x2="120" y2="150" stroke="#909aa0" stroke-width="0.5"/>

    <!-- Teeth details -->
    <path d="M 78,60 L 80,63 M 85,60 L 87,63 M 92,60 L 94,63 M 99,60 L 101,63 M 106,60 L 108,63" fill="none" stroke="#707880" stroke-width="0.4"/>
    <path d="M 76,80 L 78,83 M 83,80 L 85,83 M 90,80 L 92,83 M 97,80 L 99,83 M 104,80 L 106,83 M 111,80 L 113,83" fill="none" stroke="#707880" stroke-width="0.4"/>
    <path d="M 74,100 L 76,103 M 81,100 L 83,103 M 88,100 L 90,103 M 95,100 L 97,103 M 102,100 L 104,103 M 109,100 L 111,103" fill="none" stroke="#707880" stroke-width="0.4"/>

    <!-- Broach shoulder/collar at top -->
    <rect x="80" y="46" width="30" height="6" rx="1" fill="#a0a8b8" stroke="#707880" stroke-width="0.5"/>
  </g>

  <!-- Broach handle/striker -->
  <rect x="88" y="26" width="14" height="20" rx="1" fill="#808890" stroke="#606870" stroke-width="0.5"/>
  <rect x="86" y="22" width="18" height="6" rx="1" fill="#707880" stroke="#505860" stroke-width="0.5"/>

  <!-- Impact arrows -->
  <line x1="95" y1="18" x2="95" y2="8" stroke="#ffdd80" stroke-width="1"/>
  <path d="M 90,12 L 95,18 L 100,12" fill="none" stroke="#ffdd80" stroke-width="0.8"/>
  <line x1="88" y1="15" x2="88" y2="5" stroke="#ffdd80" stroke-width="0.8"/>
  <path d="M 83,9 L 88,15 L 93,9" fill="none" stroke="#ffdd80" stroke-width="0.6"/>
  <line x1="102" y1="15" x2="102" y2="5" stroke="#ffdd80" stroke-width="0.8"/>
  <path d="M 97,9 L 102,15 L 107,9" fill="none" stroke="#ffdd80" stroke-width="0.6"/>

  <!-- Cortical bone labels -->
  <line x1="42" y1="100" x2="25" y2="95" stroke="#a0e0a0" stroke-width="0.3"/>
  <text x="8" y="93" fill="#a0e0a0" font-family="Arial, sans-serif" font-size="6">cortex</text>

  <line x1="150" y1="105" x2="165" y2="100" stroke="#a0e0a0" stroke-width="0.3"/>
  <text x="167" y="102" fill="#a0e0a0" font-family="Arial, sans-serif" font-size="6">cortex</text>

  <!-- Canal label -->
  <line x1="95" y1="170" x2="95" y2="180" stroke="#e0c0a0" stroke-width="0.3"/>
  <text x="95" y="188" text-anchor="middle" fill="#e0c0a0" font-family="Arial, sans-serif" font-size="6">medullary canal</text>

  <!-- Broach label -->
  <line x1="120" y1="90" x2="162" y2="80" stroke="#c0d0e0" stroke-width="0.3"/>
  <text x="164" y="78" fill="#c0d0e0" font-family="Arial, sans-serif" font-size="6">broach/rasp</text>
  <text x="164" y="86" fill="#8090a0" font-family="Arial, sans-serif" font-size="5">(sizes incrementally)</text>

  <!-- Cross-section detail box -->
  <rect x="180" y="120" width="90" height="70" rx="3" fill="#1a3a1a" stroke="#3a6a3a" stroke-width="0.5" opacity="0.85"/>
  <text x="225" y="133" text-anchor="middle" fill="#a0e0a0" font-family="Arial, sans-serif" font-size="6" font-weight="bold">Cross Section</text>

  <!-- Cross-section of femur with broach -->
  <ellipse cx="225" cy="163" rx="22" ry="18" fill="url(#boneF)" stroke="#b89a6a" stroke-width="0.7"/>
  <ellipse cx="225" cy="163" rx="15" ry="12" fill="url(#cancellous)" stroke="#c0a070" stroke-width="0.4" opacity="0.6"/>
  <!-- Broach cross section (trapezoidal) -->
  <path d="M 215,157 L 218,153 L 232,153 L 235,157 L 233,173 L 230,175 L 220,175 L 217,173 Z" fill="url(#broachMetal)" stroke="#606870" stroke-width="0.5"/>
  <text x="225" y="190" text-anchor="middle" fill="#80b080" font-family="Arial, sans-serif" font-size="5">broach in canal</text>

  <!-- Calcar region label -->
  <line x1="68" y1="50" x2="30" y2="52" stroke="#a0e0a0" stroke-width="0.3"/>
  <text x="8" y="50" fill="#a0e0a0" font-family="Arial, sans-serif" font-size="5.5">calcar</text>

  <!-- Orientation -->
  <text x="10" y="195" fill="#60a060" font-family="Arial, sans-serif" font-size="6">AP View</text>
</svg>