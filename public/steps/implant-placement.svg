<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="280" y2="200"><stop offset="0%" stop-color="#FEF3C7"/><stop offset="100%" stop-color="#FDE68A"/></linearGradient>
    <linearGradient id="plateG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#CBD5E1"/><stop offset="100%" stop-color="#94A3B8"/></linearGradient>
  </defs>
  <rect width="280" height="200" rx="12" fill="url(#bg3)"/>
  <!-- Bone fragments -->
  <rect x="40" y="90" width="95" height="35" rx="10" fill="#F5E6D3" stroke="#D4A574" stroke-width="1.5"/>
  <rect x="145" y="90" width="95" height="35" rx="10" fill="#F5E6D3" stroke="#D4A574" stroke-width="1.5"/>
  <!-- Fracture gap -->
  <path d="M137 90 L142 107 L135 125" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="3 2"/>
  <!-- Plate being placed (hovering above) -->
  <rect x="55" y="72" width="170" height="14" rx="3" fill="url(#plateG)" stroke="#64748B" stroke-width="1.5" opacity="0.9"/>
  <!-- Screw holes in plate -->
  <circle cx="85" cy="79" r="4" fill="#E2E8F0" stroke="#64748B" stroke-width="0.8"/>
  <circle cx="115" cy="79" r="4" fill="#E2E8F0" stroke="#64748B" stroke-width="0.8"/>
  <circle cx="145" cy="79" r="4" fill="#E2E8F0" stroke="#64748B" stroke-width="0.8"/>
  <circle cx="175" cy="79" r="4" fill="#E2E8F0" stroke="#64748B" stroke-width="0.8"/>
  <circle cx="205" cy="79" r="4" fill="#E2E8F0" stroke="#64748B" stroke-width="0.8"/>
  <!-- Downward arrow showing placement -->
  <path d="M140 50 L140 65" stroke="#D97706" stroke-width="2" marker-end="url(#arrow3)"/>
  <path d="M100 55 L100 68" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <path d="M180 55 L180 68" stroke="#D97706" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <!-- Reduction clamp -->
  <g transform="translate(50, 110)">
    <path d="M0 10 L20 0 M0 10 L20 20" stroke="#64748B" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="10" r="3" fill="#94A3B8"/>
  </g>
  <!-- Instrument -->
  <g transform="translate(210, 100)">
    <rect x="0" y="0" width="40" height="8" rx="2" fill="#94A3B8"/>
    <text x="20" y="26" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#6B7280">Plate holder</text>
  </g>
  <marker id="arrow3" viewBox="0 0 8 8" refX="8" refY="4" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L8,4 L0,8" fill="#D97706"/></marker>
  <rect x="70" y="160" width="140" height="26" rx="8" fill="white" fill-opacity="0.9"/>
  <text x="140" y="177" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#92400E">Implant Positioning</text>
</svg>