<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <defs>
    <linearGradient id="orangeBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a3a1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c06020;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="implantO" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e4e8"/>
      <stop offset="100%" style="stop-color:#b0b8c8"/>
    </linearGradient>
    <linearGradient id="cement" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0e8"/>
      <stop offset="100%" style="stop-color:#d8d8c8"/>
    </linearGradient>
    <linearGradient id="boneO" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5e6c8"/>
      <stop offset="100%" style="stop-color:#e8d4a8"/>
    </linearGradient>
  </defs>
  <rect width="280" height="200" fill="url(#orangeBg)"/>

  <!-- Femoral shaft -->
  <path d="M105,8 L103,30 L100,50 L98,62 L182,62 L180,50 L177,30 L175,8"
        fill="url(#boneO)" stroke="#c4a870" stroke-width="1"/>

  <!-- Cement layer around femoral component -->
  <path d="M90,62 L90,70 Q88,78 85,85 Q82,95 80,105 Q77,115 80,125
           Q84,135 94,140 Q107,147 122,145 Q134,143 142,138 Q150,143 158,145
           Q173,147 186,140 Q196,135 200,125 Q203,115 200,105 Q198,95 195,85
           Q192,78 190,70 L190,62Z"
        fill="url(#cement)" stroke="#c8c8b8" stroke-width="0.8" opacity="0.6"/>

  <!-- Definitive femoral component -->
  <g id="defFemoral">
    <path d="M92,62 L92,70 Q90,76 87,83 Q84,93 82,103 Q79,113 82,123
             Q86,133 95,138 Q108,145 123,143 Q133,141 141,136 Q149,141 157,143
             Q172,145 185,138 Q195,133 198,123 Q201,113 198,103 Q196,93 193,83
             Q190,76 188,70 L188,62Z"
          fill="url(#implantO)" stroke="#808890" stroke-width="1.2"/>
    <!-- Articular polish lines -->
    <path d="M82,103 Q79,113 82,123 Q86,133 95,138" fill="none" stroke="#c8d0d8" stroke-width="0.8"/>
    <path d="M198,103 Q201,113 198,123 Q195,133 185,138" fill="none" stroke="#c8d0d8" stroke-width="0.8"/>
  </g>

  <!-- Cement between bone and implant - squeezed out -->
  <path d="M88,68 Q86,66 88,64" fill="none" stroke="#e8e8d8" stroke-width="2" opacity="0.5"/>
  <path d="M192,68 Q194,66 192,64" fill="none" stroke="#e8e8d8" stroke-width="2" opacity="0.5"/>

  <!-- Polyethylene insert -->
  <path d="M84,146 L84,153 Q84,156 87,158 L193,158 Q196,156 196,153 L196,146
           Q188,143 157,143 L141,144 L123,143 Q92,143 84,146Z"
        fill="#e0e0e8" stroke="#a0a0b0" stroke-width="1"/>
  <ellipse cx="112" cy="149" rx="20" ry="2.5" fill="none" stroke="#c8c8d8" stroke-width="0.8"/>
  <ellipse cx="170" cy="149" rx="20" ry="2.5" fill="none" stroke="#c8c8d8" stroke-width="0.8"/>

  <!-- Tibial baseplate with cement -->
  <rect x="80" y="158" width="120" height="6" rx="1" fill="url(#implantO)" stroke="#808890" stroke-width="1"/>
  <!-- Cement under tibial component -->
  <rect x="78" y="164" width="124" height="3" rx="0.5" fill="url(#cement)" stroke="#c8c8b8" stroke-width="0.5" opacity="0.7"/>
  <!-- Tibial stem -->
  <rect x="134" y="164" width="12" height="22" rx="1" fill="url(#implantO)" stroke="#808890" stroke-width="0.8"/>

  <!-- Tibial bone -->
  <path d="M86,167 L84,185 L84,195 L196,195 L196,185 L194,167"
        fill="url(#boneO)" stroke="#c4a870" stroke-width="1" opacity="0.7"/>

  <!-- Cement gun applying cement -->
  <g id="cementGun" transform="translate(220,70)">
    <rect x="0" y="-3" width="40" height="6" rx="2" fill="#707880" stroke="#505860" stroke-width="0.8"/>
    <rect x="-8" y="-2" width="10" height="4" rx="1" fill="#909aa0" stroke="#707880" stroke-width="0.5"/>
    <!-- Nozzle -->
    <path d="M-8,0 L-18,0" stroke="#b0b8c0" stroke-width="2"/>
    <!-- Cement coming out -->
    <circle cx="-20" cy="0" r="2" fill="#e8e8d8" opacity="0.7"/>
    <circle cx="-22" cy="2" r="1.5" fill="#e8e8d8" opacity="0.5"/>
    <!-- Plunger handle -->
    <line x1="40" y1="0" x2="50" y2="0" stroke="#606870" stroke-width="3"/>
    <line x1="50" y1="-5" x2="50" y2="5" stroke="#606870" stroke-width="2"/>
  </g>

  <!-- Labels -->
  <text x="15" y="20" fill="#f0d8c0" font-size="7" font-family="Arial">Femur</text>
  <line x1="35" y1="18" x2="103" y2="25" stroke="#f0d8c0" stroke-width="0.4" opacity="0.6"/>
  <text x="15" y="75" fill="#f0d8c0" font-size="7" font-family="Arial">Femoral</text>
  <text x="15" y="83" fill="#f0d8c0" font-size="7" font-family="Arial">implant</text>
  <line x1="40" y1="80" x2="92" y2="85" stroke="#f0d8c0" stroke-width="0.4" opacity="0.6"/>
  <text x="15" y="105" fill="#f0e8d0" font-size="6.5" font-family="Arial">PMMA</text>
  <text x="15" y="113" fill="#f0e8d0" font-size="6.5" font-family="Arial">cement</text>
  <line x1="38" y1="108" x2="88" y2="67" stroke="#f0e8d0" stroke-width="0.4" opacity="0.6"/>
  <text x="15" y="153" fill="#f0d8c0" font-size="7" font-family="Arial">Poly liner</text>
  <line x1="52" y1="151" x2="84" y2="150" stroke="#f0d8c0" stroke-width="0.4" opacity="0.6"/>
  <text x="15" y="166" fill="#f0d8c0" font-size="7" font-family="Arial">Tibial tray</text>
  <line x1="52" y1="164" x2="80" y2="161" stroke="#f0d8c0" stroke-width="0.4" opacity="0.6"/>
  <text x="222" y="60" fill="#f0d8c0" font-size="7" font-family="Arial">Cement gun</text>

  <text x="140" y="197" fill="#f0d8c0" font-size="7.5" font-family="Arial" text-anchor="middle" font-weight="bold">Final Cementation</text>
</svg>