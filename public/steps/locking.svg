<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none">
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="280" y2="200"><stop offset="0%" stop-color="#FDF4FF"/><stop offset="100%" stop-color="#FAE8FF"/></linearGradient>
  </defs>
  <rect width="280" height="200" rx="12" fill="url(#bg9)"/>
  <!-- Bone with nail inside -->
  <rect x="100" y="20" width="80" height="160" rx="20" fill="#F5E6D3" stroke="#D4A574" stroke-width="1.5" opacity="0.5"/>
  <!-- IM Nail -->
  <rect x="125" y="25" width="30" height="150" rx="4" fill="#94A3B8" stroke="#64748B" stroke-width="1"/>
  <!-- Locking bolt through bone and nail (proximal) -->
  <line x1="65" y1="55" x2="215" y2="55" stroke="#475569" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="65" cy="55" r="5" fill="#94A3B8" stroke="#64748B" stroke-width="1"/>
  <circle cx="215" cy="55" r="5" fill="#94A3B8" stroke="#64748B" stroke-width="1"/>
  <!-- Drill and trocar for distal locking -->
  <g transform="translate(65, 140)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#475569" stroke-width="3" stroke-linecap="round"/>
    <!-- Drill -->
    <rect x="-40" y="-6" width="42" height="12" rx="3" fill="#374151"/>
    <rect x="-35" y="-3" width="8" height="6" rx="1" fill="#22C55E" opacity="0.5"/>
  </g>
  <!-- Perfect circle technique label -->
  <g transform="translate(175, 125)">
    <circle cx="0" cy="0" r="15" fill="none" stroke="#A855F7" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="4" fill="#A855F7" opacity="0.3"/>
    <circle cx="0" cy="0" r="1.5" fill="#A855F7"/>
    <text x="20" y="-5" font-family="system-ui,sans-serif" font-size="7" fill="#7C3AED">Perfect</text>
    <text x="20" y="5" font-family="system-ui,sans-serif" font-size="7" fill="#7C3AED">circle</text>
  </g>
  <!-- Targeting jig for proximal -->
  <path d="M215 55 L240 55 L245 50 L245 60 L240 55" stroke="#64748B" stroke-width="1.5" fill="none"/>
  <text x="248" y="58" font-family="system-ui,sans-serif" font-size="7" fill="#6B7280">Jig</text>
  <!-- Labels -->
  <text x="140" y="15" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#7C3AED">Proximal: targeting jig</text>
  <text x="140" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#7C3AED">Distal: freehand technique</text>
  <rect x="70" y="168" width="140" height="26" rx="8" fill="white" fill-opacity="0.9"/>
  <text x="140" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#7C3AED">Interlocking</text>
</svg>