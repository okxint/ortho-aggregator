<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="280" y2="200"><stop offset="0%" stop-color="#EFF6FF"/><stop offset="100%" stop-color="#DBEAFE"/></linearGradient>
    <linearGradient id="nailG" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#B0BEC5"/><stop offset="50%" stop-color="#E0E0E0"/><stop offset="100%" stop-color="#90A4AE"/></linearGradient>
  </defs>
  <rect width="280" height="200" rx="12" fill="url(#bg8)"/>
  <!-- Femur outline -->
  <path d="M100 20 Q85 30 90 50 L90 160 Q85 180 100 185 L180 185 Q195 180 190 160 L190 50 Q195 30 180 20 Z" fill="#F5E6D3" stroke="#D4A574" stroke-width="1.5" opacity="0.5"/>
  <!-- Canal -->
  <rect x="115" y="40" width="50" height="135" rx="8" fill="#FEF3C7" opacity="0.4"/>
  <!-- IM Nail being inserted -->
  <rect x="128" y="10" width="24" height="150" rx="4" fill="url(#nailG)" stroke="#64748B" stroke-width="1.5"/>
  <!-- Insertion handle/jig on top -->
  <rect x="118" y="0" width="44" height="15" rx="3" fill="#475569"/>
  <rect x="125" y="-10" width="30" height="14" rx="3" fill="#374151"/>
  <!-- Targeting jig arm -->
  <path d="M118 8 L60 8 L60 30" stroke="#64748B" stroke-width="2.5" fill="none"/>
  <path d="M162 8 L220 8 L220 30" stroke="#64748B" stroke-width="2.5" fill="none"/>
  <!-- Locking holes -->
  <ellipse cx="140" cy="50" rx="12" ry="4" fill="#E2E8F0" stroke="#64748B" stroke-width="0.8"/>
  <ellipse cx="140" cy="135" rx="12" ry="4" fill="#E2E8F0" stroke="#64748B" stroke-width="0.8"/>
  <ellipse cx="140" cy="148" rx="12" ry="4" fill="#E2E8F0" stroke="#64748B" stroke-width="0.8"/>
  <!-- Downward arrow -->
  <path d="M140 -20 L140 -5" stroke="#2563EB" stroke-width="2" marker-end="url(#arr8)"/>
  <text x="155" y="-12" font-family="system-ui,sans-serif" font-size="8" fill="#2563EB">Insert</text>
  <marker id="arr8" viewBox="0 0 8 8" refX="8" refY="4" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L8,4 L0,8" fill="#2563EB"/></marker>
  <rect x="70" y="168" width="140" height="26" rx="8" fill="white" fill-opacity="0.9"/>
  <text x="140" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#1E40AF">Nail Insertion</text>
</svg>