<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#2d3548"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#151520"/>
    </linearGradient>
    <linearGradient id="fluoro" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a1a"/>
      <stop offset="50%" stop-color="#0d1a0d"/>
      <stop offset="100%" stop-color="#1a2a1a"/>
    </linearGradient>
    <linearGradient id="boneXray" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0e0d8" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#f0f0e8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d8d8d0" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="nailXray" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#f8f8ff"/>
      <stop offset="100%" stop-color="#e8e8f0"/>
    </linearGradient>
    <linearGradient id="monitor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="280" height="200" fill="url(#bg)"/>

  <!-- Title -->
  <text x="140" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#a0a8c0" letter-spacing="1">FLUOROSCOPIC VERIFICATION</text>

  <!-- === LEFT MONITOR: AP VIEW === -->
  <!-- Monitor frame -->
  <rect x="8" y="22" width="126" height="170" rx="4" fill="url(#monitor)" stroke="#555" stroke-width="0.8"/>
  <!-- Screen -->
  <rect x="12" y="26" width="118" height="148" rx="2" fill="url(#screen)"/>
  <!-- Fluoroscopy green tint -->
  <rect x="12" y="26" width="118" height="148" rx="2" fill="url(#fluoro)" opacity="0.3"/>

  <!-- AP View Label -->
  <rect x="14" y="28" width="20" height="10" rx="1" fill="#000" opacity="0.6"/>
  <text x="24" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#00ff00">AP</text>

  <!-- AP View - Femur with nail -->
  <!-- Bone outline (AP - wider, showing both cortices) -->
  <path d="M 50,40 C 48,55 46,75 45,95 C 44,115 43,135 43,155 C 43,162 46,168 52,170 L 90,170 C 96,168 99,162 99,155 C 99,135 98,115 97,95 C 96,75 94,55 92,40 Z" fill="none" stroke="#c0c0b8" stroke-width="1" opacity="0.7"/>
  <!-- Bone fill (semi-transparent, x-ray style) -->
  <path d="M 50,40 C 48,55 46,75 45,95 C 44,115 43,135 43,155 C 43,162 46,168 52,170 L 90,170 C 96,168 99,162 99,155 C 99,135 98,115 97,95 C 96,75 94,55 92,40 Z" fill="#888880" opacity="0.15"/>

  <!-- Cortex shadows -->
  <path d="M 53,42 C 51,57 49,77 48,97 C 47,117 47,137 47,155" stroke="#a0a098" stroke-width="0.5" fill="none" opacity="0.5"/>
  <path d="M 89,42 C 91,57 93,77 94,97 C 95,117 95,137 95,155" stroke="#a0a098" stroke-width="0.5" fill="none" opacity="0.5"/>

  <!-- Medullary canal (dark center) -->
  <path d="M 60,42 C 58,57 57,77 56,97 C 55,117 55,137 55,157 L 87,157 C 87,137 87,117 86,97 C 85,77 84,57 82,42 Z" fill="#080808" opacity="0.3"/>

  <!-- IM Nail (bright white on x-ray, AP view) -->
  <rect x="62" y="40" width="18" height="128" rx="1" fill="url(#nailXray)" stroke="#ffffff" stroke-width="0.3" opacity="0.95"/>

  <!-- Proximal locking screws (AP - seen as lines) -->
  <rect x="42" y="62" width="58" height="2.5" rx="0.5" fill="#ffffff" opacity="0.9"/>
  <rect x="42" y="78" width="58" height="2.5" rx="0.5" fill="#ffffff" opacity="0.9"/>

  <!-- Distal locking screws -->
  <rect x="42" y="138" width="58" height="2.5" rx="0.5" fill="#ffffff" opacity="0.9"/>
  <rect x="42" y="150" width="58" height="2.5" rx="0.5" fill="#ffffff" opacity="0.9"/>

  <!-- Nail locking holes visible -->
  <rect x="65" y="62" width="12" height="2.5" fill="#888" opacity="0.5"/>
  <rect x="65" y="78" width="12" height="2.5" fill="#888" opacity="0.5"/>
  <rect x="65" y="138" width="12" height="2.5" fill="#888" opacity="0.5"/>
  <rect x="65" y="150" width="12" height="2.5" fill="#888" opacity="0.5"/>

  <!-- Screw tips beyond far cortex check -->
  <line x1="100" y1="63" x2="103" y2="63" stroke="#ffff00" stroke-width="0.5" opacity="0.6"/>
  <line x1="100" y1="79" x2="103" y2="79" stroke="#ffff00" stroke-width="0.5" opacity="0.6"/>

  <!-- R marker -->
  <text x="116" y="40" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#ffffff" opacity="0.5">R</text>

  <!-- AP view annotations -->
  <text x="14" y="66" font-family="Arial, sans-serif" font-size="5.5" fill="#00cc00" opacity="0.8">Prox screws</text>
  <text x="14" y="142" font-family="Arial, sans-serif" font-size="5.5" fill="#00cc00" opacity="0.8">Dist screws</text>

  <!-- Check marks for alignment -->
  <path d="M 106,62 L 108,65 L 112,58" stroke="#00ff00" stroke-width="0.8" fill="none" opacity="0.7"/>
  <path d="M 106,138 L 108,141 L 112,134" stroke="#00ff00" stroke-width="0.8" fill="none" opacity="0.7"/>

  <!-- === RIGHT MONITOR: LATERAL VIEW === -->
  <!-- Monitor frame -->
  <rect x="146" y="22" width="126" height="170" rx="4" fill="url(#monitor)" stroke="#555" stroke-width="0.8"/>
  <!-- Screen -->
  <rect x="150" y="26" width="118" height="148" rx="2" fill="url(#screen)"/>
  <!-- Fluoroscopy tint -->
  <rect x="150" y="26" width="118" height="148" rx="2" fill="url(#fluoro)" opacity="0.3"/>

  <!-- LAT View Label -->
  <rect x="152" y="28" width="24" height="10" rx="1" fill="#000" opacity="0.6"/>
  <text x="164" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#00ff00">LAT</text>

  <!-- Lateral View - Femur with nail -->
  <!-- Bone outline (lateral - narrower AP dimension, with anterior bow) -->
  <path d="M 198,40 C 195,55 192,75 190,95 C 189,115 189,135 190,155 C 191,162 194,168 198,170 L 222,170 C 226,168 229,162 230,155 C 231,135 232,115 232,95 C 232,75 230,55 228,40 Z" fill="none" stroke="#c0c0b8" stroke-width="1" opacity="0.7"/>
  <path d="M 198,40 C 195,55 192,75 190,95 C 189,115 189,135 190,155 C 191,162 194,168 198,170 L 222,170 C 226,168 229,162 230,155 C 231,135 232,115 232,95 C 232,75 230,55 228,40 Z" fill="#888880" opacity="0.15"/>

  <!-- Cortex shadows (lateral) -->
  <path d="M 200,42 C 197,57 195,77 193,97 C 192,117 192,137 193,155" stroke="#a0a098" stroke-width="0.5" fill="none" opacity="0.5"/>
  <path d="M 226,42 C 228,57 230,77 230,97 C 230,117 230,137 228,155" stroke="#a0a098" stroke-width="0.5" fill="none" opacity="0.5"/>

  <!-- IM Nail (lateral view - shows anterior bow) -->
  <path d="M 206,40 C 204,60 203,80 203,100 C 203,120 204,140 206,160 L 218,160 C 220,140 221,120 221,100 C 221,80 220,60 218,40 Z" fill="url(#nailXray)" stroke="#ffffff" stroke-width="0.3" opacity="0.95"/>

  <!-- Locking screws (lateral - seen as circles/dots) -->
  <!-- Proximal screws (end-on view = circles) -->
  <circle cx="212" cy="63" r="3.5" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.9"/>
  <circle cx="212" cy="63" r="1" fill="#ffffff" opacity="0.7"/>
  <circle cx="212" cy="79" r="3.5" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.9"/>
  <circle cx="212" cy="79" r="1" fill="#ffffff" opacity="0.7"/>

  <!-- Distal screws (end-on view) -->
  <circle cx="212" cy="139" r="3.5" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.9"/>
  <circle cx="212" cy="139" r="1" fill="#ffffff" opacity="0.7"/>
  <circle cx="212" cy="151" r="3.5" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.9"/>
  <circle cx="212" cy="151" r="1" fill="#ffffff" opacity="0.7"/>

  <!-- A/P markers -->
  <text x="182" y="100" font-family="Arial, sans-serif" font-size="6" fill="#ffffff" opacity="0.4">A</text>
  <text x="238" y="100" font-family="Arial, sans-serif" font-size="6" fill="#ffffff" opacity="0.4">P</text>

  <!-- LAT view annotations -->
  <text x="152" y="66" font-family="Arial, sans-serif" font-size="5.5" fill="#00cc00" opacity="0.8">End-on</text>
  <text x="152" y="73" font-family="Arial, sans-serif" font-size="5.5" fill="#00cc00" opacity="0.8">screws</text>

  <!-- Nail bow annotation -->
  <path d="M 240,70 C 242,90 242,110 240,130" stroke="#ffcc00" stroke-width="0.4" fill="none" stroke-dasharray="2,1" opacity="0.5"/>
  <text x="244" y="100" font-family="Arial, sans-serif" font-size="5" fill="#ffcc00" opacity="0.6">Bow</text>

  <!-- Check marks -->
  <path d="M 230,62 L 232,65 L 236,58" stroke="#00ff00" stroke-width="0.8" fill="none" opacity="0.7"/>
  <path d="M 230,138 L 232,141 L 236,134" stroke="#00ff00" stroke-width="0.8" fill="none" opacity="0.7"/>

  <!-- Monitor stand hints -->
  <rect x="62" y="192" width="18" height="4" rx="1" fill="#333"/>
  <rect x="200" y="192" width="18" height="4" rx="1" fill="#333"/>

  <!-- Bottom status bar (both monitors) -->
  <rect x="12" y="162" width="118" height="12" rx="0" fill="#000" opacity="0.5"/>
  <text x="18" y="170" font-family="monospace" font-size="5" fill="#00cc00" opacity="0.7">FLUORO  70kV  3.2mA</text>
  <text x="98" y="170" font-family="monospace" font-size="5" fill="#00cc00" opacity="0.7">00:42</text>

  <rect x="150" y="162" width="118" height="12" rx="0" fill="#000" opacity="0.5"/>
  <text x="156" y="170" font-family="monospace" font-size="5" fill="#00cc00" opacity="0.7">FLUORO  72kV  3.0mA</text>
  <text x="236" y="170" font-family="monospace" font-size="5" fill="#00cc00" opacity="0.7">00:43</text>
</svg>