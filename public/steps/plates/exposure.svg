<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f2f1"/>
      <stop offset="100%" stop-color="#b2dfdb"/>
    </linearGradient>
    <linearGradient id="boneGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="40%" stop-color="#e8dcc8"/>
      <stop offset="100%" stop-color="#d4c4a0"/>
    </linearGradient>
    <linearGradient id="cortexGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4c4a0"/>
      <stop offset="100%" stop-color="#bfae8a"/>
    </linearGradient>
    <linearGradient id="marrowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffccbc"/>
      <stop offset="100%" stop-color="#ef9a9a"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffccbc"/>
      <stop offset="100%" stop-color="#d7a892"/>
    </linearGradient>
    <linearGradient id="muscleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef9a9a"/>
      <stop offset="100%" stop-color="#c62828" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="periostGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="100%" stop-color="#f0e68c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="280" height="200" fill="url(#bgGrad)" rx="4"/>

  <!-- Skin flaps - retracted open -->
  <!-- Left skin flap -->
  <path d="M 30,60 Q 50,55 65,48 L 75,40 Q 78,38 80,42 L 78,52 Q 75,58 68,62 L 55,65 Z" fill="url(#skinGrad)" stroke="#a1887f" stroke-width="0.8"/>
  <!-- Right skin flap -->
  <path d="M 250,60 Q 230,55 215,48 L 205,40 Q 202,38 200,42 L 202,52 Q 205,58 212,62 L 225,65 Z" fill="url(#skinGrad)" stroke="#a1887f" stroke-width="0.8"/>

  <!-- Subcutaneous fat layer -->
  <path d="M 68,62 Q 70,58 75,56 L 78,52 L 80,58 Q 82,62 80,66 L 75,68 Z" fill="#fff3e0" stroke="#ffcc80" stroke-width="0.5"/>
  <path d="M 212,62 Q 210,58 205,56 L 202,52 L 200,58 Q 198,62 200,66 L 205,68 Z" fill="#fff3e0" stroke="#ffcc80" stroke-width="0.5"/>

  <!-- Muscle/fascia layers -->
  <path d="M 75,68 Q 85,64 90,62 L 95,66 Q 92,72 85,76 L 78,74 Z" fill="url(#muscleGrad)" stroke="#c62828" stroke-width="0.5" opacity="0.7"/>
  <path d="M 205,68 Q 195,64 190,62 L 185,66 Q 188,72 195,76 L 202,74 Z" fill="url(#muscleGrad)" stroke="#c62828" stroke-width="0.5" opacity="0.7"/>

  <!-- Retractor - Left (Hohmann style) -->
  <g>
    <path d="M 22,30 L 40,25 L 65,42 L 72,55 L 68,58 L 58,48 L 35,32 Z" fill="#c0c0c0" stroke="#808080" stroke-width="0.8"/>
    <path d="M 22,30 L 40,25 L 35,32 Z" fill="#d8d8d8" stroke="#808080" stroke-width="0.6"/>
    <!-- Retractor tip hooking periosteum -->
    <path d="M 68,58 L 75,64 L 78,68 Q 80,70 78,72 L 75,70 L 70,62 Z" fill="#b0b0b0" stroke="#808080" stroke-width="0.6"/>
    <!-- Handle -->
    <rect x="10" y="22" width="16" height="12" rx="2" fill="#a0a0a0" stroke="#707070" stroke-width="0.6"/>
  </g>

  <!-- Retractor - Right (Hohmann style) -->
  <g>
    <path d="M 258,30 L 240,25 L 215,42 L 208,55 L 212,58 L 222,48 L 245,32 Z" fill="#c0c0c0" stroke="#808080" stroke-width="0.8"/>
    <path d="M 258,30 L 240,25 L 245,32 Z" fill="#d8d8d8" stroke="#808080" stroke-width="0.6"/>
    <path d="M 212,58 L 205,64 L 202,68 Q 200,70 202,72 L 205,70 L 210,62 Z" fill="#b0b0b0" stroke="#808080" stroke-width="0.6"/>
    <rect x="254" y="22" width="16" height="12" rx="2" fill="#a0a0a0" stroke="#707070" stroke-width="0.6"/>
  </g>

  <!-- Reflected periosteum - left side -->
  <path d="M 78,72 Q 82,74 88,78 L 92,82 Q 90,86 86,84 L 80,78 Z" fill="url(#periostGrad)" stroke="#c0a030" stroke-width="0.5"/>
  <!-- Reflected periosteum - right side -->
  <path d="M 202,72 Q 198,74 192,78 L 188,82 Q 190,86 194,84 L 200,78 Z" fill="url(#periostGrad)" stroke="#c0a030" stroke-width="0.5"/>

  <!-- Bone - proximal fragment (left) -->
  <g>
    <!-- Cortical bone outer -->
    <path d="M 85,82 L 85,160 Q 85,165 90,165 L 128,165 Q 132,165 132,160 L 132,82 Q 130,78 128,80 L 90,80 Q 87,78 85,82 Z" fill="url(#cortexGrad)" stroke="#a08060" stroke-width="1"/>
    <!-- Medullary canal -->
    <rect x="95" y="84" width="28" height="78" rx="2" fill="url(#marrowGrad)" opacity="0.6"/>
    <!-- Fracture surface - oblique -->
    <path d="M 132,100 L 130,108 L 128,116 L 132,124 L 130,130" stroke="#604020" stroke-width="1.2" fill="none"/>
    <path d="M 85,105 L 87,112 L 85,120 L 88,128 L 85,132" stroke="#604020" stroke-width="1.2" fill="none"/>
  </g>

  <!-- Fracture gap -->
  <rect x="132" y="80" width="12" height="86" fill="none"/>
  <!-- Fracture line visualization -->
  <line x1="132" y1="82" x2="132" y2="165" stroke="#604020" stroke-width="0.8" stroke-dasharray="2,1"/>
  <line x1="144" y1="82" x2="144" y2="165" stroke="#604020" stroke-width="0.8" stroke-dasharray="2,1"/>

  <!-- Small bone fragments/debris in gap -->
  <circle cx="137" cy="110" r="1.5" fill="#d4c4a0" stroke="#a08060" stroke-width="0.3"/>
  <circle cx="139" cy="130" r="1" fill="#d4c4a0" stroke="#a08060" stroke-width="0.3"/>
  <ellipse cx="136" cy="145" rx="1.5" ry="1" fill="#d4c4a0" stroke="#a08060" stroke-width="0.3"/>

  <!-- Bone - distal fragment (right) -->
  <g>
    <path d="M 144,82 L 144,160 Q 144,165 149,165 L 187,165 Q 192,165 192,160 L 192,82 Q 190,78 187,80 L 149,80 Q 146,78 144,82 Z" fill="url(#cortexGrad)" stroke="#a08060" stroke-width="1"/>
    <rect x="154" y="84" width="28" height="78" rx="2" fill="url(#marrowGrad)" opacity="0.6"/>
    <path d="M 144,102 L 146,110 L 144,118 L 147,126 L 144,132" stroke="#604020" stroke-width="1.2" fill="none"/>
    <path d="M 192,106 L 190,114 L 192,122 L 189,128 L 192,134" stroke="#604020" stroke-width="1.2" fill="none"/>
  </g>

  <!-- Cortex detail lines on bone surface -->
  <line x1="88" y1="90" x2="88" y2="158" stroke="#bfae8a" stroke-width="0.4" opacity="0.5"/>
  <line x1="92" y1="88" x2="92" y2="160" stroke="#bfae8a" stroke-width="0.3" opacity="0.4"/>
  <line x1="148" y1="88" x2="148" y2="160" stroke="#bfae8a" stroke-width="0.3" opacity="0.4"/>
  <line x1="185" y1="90" x2="185" y2="158" stroke="#bfae8a" stroke-width="0.4" opacity="0.5"/>
  <line x1="189" y1="88" x2="189" y2="160" stroke="#bfae8a" stroke-width="0.3" opacity="0.4"/>

  <!-- Labels -->
  <style>
    .label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 7px; fill: #37474f; }
    .label-line { stroke: #546e7a; stroke-width: 0.5; stroke-dasharray: 1,1; }
  </style>

  <!-- Skin label -->
  <text x="42" y="38" class="label">Skin flap</text>
  <line x1="55" y1="40" x2="62" y2="47" class="label-line"/>

  <!-- Retractor label -->
  <text x="6" y="18" class="label">Retractor</text>
  <line x1="20" y1="19" x2="24" y2="24" class="label-line"/>

  <!-- Periosteum label -->
  <text x="42" y="90" class="label">Periosteum</text>
  <line x1="68" y1="88" x2="80" y2="80" class="label-line"/>

  <!-- Cortex label -->
  <text x="88" y="176" class="label">Cortical bone</text>

  <!-- Medullary canal label -->
  <text x="96" y="186" class="label">Medullary canal</text>

  <!-- Fracture label -->
  <text x="126" y="176" class="label" text-anchor="middle">Fracture</text>
  <line x1="138" y1="170" x2="138" y2="165" class="label-line"/>

  <!-- Title -->
  <text x="140" y="14" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="600" fill="#00695c">Step 1: Surgical Exposure</text>
</svg>