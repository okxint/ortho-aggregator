<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3e5f5"/>
      <stop offset="100%" stop-color="#e1bee7"/>
    </linearGradient>
    <linearGradient id="boneGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="40%" stop-color="#e8dcc8"/>
      <stop offset="100%" stop-color="#d4c4a0"/>
    </linearGradient>
    <linearGradient id="cortexGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4c4a0"/>
      <stop offset="100%" stop-color="#bfae8a"/>
    </linearGradient>
    <linearGradient id="marrowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffccbc"/>
      <stop offset="100%" stop-color="#ef9a9a"/>
    </linearGradient>
    <linearGradient id="plateGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="20%" stop-color="#f5f5f5"/>
      <stop offset="50%" stop-color="#bdbdbd"/>
      <stop offset="80%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#9e9e9e"/>
    </linearGradient>
    <linearGradient id="screwGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#90a4ae"/>
      <stop offset="25%" stop-color="#eceff1"/>
      <stop offset="50%" stop-color="#b0bec5"/>
      <stop offset="75%" stop-color="#eceff1"/>
      <stop offset="100%" stop-color="#90a4ae"/>
    </linearGradient>
    <linearGradient id="driverGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#607d8b"/>
      <stop offset="30%" stop-color="#90a4ae"/>
      <stop offset="70%" stop-color="#78909c"/>
      <stop offset="100%" stop-color="#546e7a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="280" height="200" fill="url(#bgGrad)" rx="4"/>

  <!-- Title -->
  <text x="140" y="14" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="600" fill="#7b1fa2">Step 5: Screw Insertion</text>

  <!-- Bone - side view cross section -->
  <g>
    <!-- Near cortex -->
    <rect x="25" y="110" width="230" height="10" rx="1" fill="url(#cortexGrad)" stroke="#a08060" stroke-width="0.8"/>
    <!-- Medullary canal -->
    <rect x="25" y="120" width="230" height="34" fill="url(#marrowGrad)" opacity="0.4"/>
    <!-- Far cortex -->
    <rect x="25" y="154" width="230" height="10" rx="1" fill="url(#cortexGrad)" stroke="#a08060" stroke-width="0.8"/>
    <!-- Bone outline -->
    <rect x="25" y="110" width="230" height="54" rx="3" fill="none" stroke="#a08060" stroke-width="1"/>
  </g>

  <!-- DCP Plate -->
  <g>
    <path d="M 40,95 Q 42,93 45,93 L 230,93 Q 233,93 235,95 L 235,108 Q 233,110 230,110 L 45,110 Q 42,110 40,108 Z" fill="url(#plateGrad)" stroke="#757575" stroke-width="0.8"/>

    <!-- Plate holes -->
    <ellipse cx="65" cy="101" rx="6" ry="3.5" fill="#424242" stroke="#616161" stroke-width="0.5"/>
    <ellipse cx="65" cy="101" rx="5" ry="2.8" fill="#212121"/>

    <ellipse cx="100" cy="101" rx="6" ry="3.5" fill="#424242" stroke="#616161" stroke-width="0.5"/>
    <ellipse cx="100" cy="101" rx="5" ry="2.8" fill="#212121"/>

    <!-- Active hole - screw being inserted here -->
    <ellipse cx="140" cy="101" rx="6" ry="3.5" fill="#424242" stroke="#616161" stroke-width="0.5"/>

    <ellipse cx="178" cy="101" rx="6" ry="3.5" fill="#424242" stroke="#616161" stroke-width="0.5"/>
    <ellipse cx="178" cy="101" rx="5" ry="2.8" fill="#212121"/>

    <ellipse cx="213" cy="101" rx="6" ry="3.5" fill="#424242" stroke="#616161" stroke-width="0.5"/>
    <ellipse cx="213" cy="101" rx="5" ry="2.8" fill="#212121"/>

    <!-- Plate highlight -->
    <line x1="48" y1="96" x2="228" y2="96" stroke="#f5f5f5" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- Cortical Screw - being driven through plate into bone, engaging both cortices -->
  <g>
    <!-- Screw head (sitting in plate hole, countersunk) -->
    <ellipse cx="140" cy="99" rx="4.5" ry="2.5" fill="#b0bec5" stroke="#78909c" stroke-width="0.5"/>
    <!-- Hex recess in screw head -->
    <path d="M 138,99 L 139,97.8 L 141,97.8 L 142,99 L 141,100.2 L 139,100.2 Z" fill="#546e7a" stroke="#455a64" stroke-width="0.3"/>

    <!-- Screw shaft through near cortex -->
    <rect x="138.5" y="101" width="3" height="10" fill="url(#screwGrad)" stroke="#78909c" stroke-width="0.3"/>

    <!-- Screw threads through near cortex - cortical screw (tight thread pitch) -->
    <line x1="137.5" y1="103" x2="142.5" y2="103" stroke="#90a4ae" stroke-width="0.5"/>
    <line x1="137.5" y1="105" x2="142.5" y2="105" stroke="#90a4ae" stroke-width="0.5"/>
    <line x1="137.5" y1="107" x2="142.5" y2="107" stroke="#90a4ae" stroke-width="0.5"/>
    <line x1="137.5" y1="109" x2="142.5" y2="109" stroke="#90a4ae" stroke-width="0.5"/>
    <line x1="137.5" y1="111" x2="142.5" y2="111" stroke="#90a4ae" stroke-width="0.5"/>
    <line x1="137.5" y1="113" x2="142.5" y2="113" stroke="#90a4ae" stroke-width="0.5"/>
    <line x1="137.5" y1="115" x2="142.5" y2="115" stroke="#90a4ae" stroke-width="0.5"/>
    <line x1="137.5" y1="117" x2="142.5" y2="117" stroke="#90a4ae" stroke-width="0.5"/>
    <line x1="137.5" y1="119" x2="142.5" y2="119" stroke="#90a4ae" stroke-width="0.5"/>

    <!-- Screw shaft through medullary canal -->
    <rect x="138.8" y="120" width="2.4" height="34" fill="url(#screwGrad)" stroke="#78909c" stroke-width="0.2"/>

    <!-- Thread lines through medullary space (smooth shaft for cortical screw or threads visible) -->
    <line x1="138" y1="122" x2="142" y2="122" stroke="#b0bec5" stroke-width="0.4"/>
    <line x1="138" y1="124" x2="142" y2="124" stroke="#b0bec5" stroke-width="0.4"/>
    <line x1="138" y1="126" x2="142" y2="126" stroke="#b0bec5" stroke-width="0.4"/>
    <line x1="138" y1="128" x2="142" y2="128" stroke="#b0bec5" stroke-width="0.4"/>
    <line x1="138" y1="130" x2="142" y2="130" stroke="#b0bec5" stroke-width="0.4"/>
    <line x1="138" y1="132" x2="142" y2="132" stroke="#b0bec5" stroke-width="0.4"/>
    <line x1="138" y1="134" x2="142" y2="134" stroke="#b0bec5" stroke-width="0.4"/>
    <line x1="138" y1="136" x2="142" y2="136" stroke="#b0bec5" stroke-width="0.4"/>
    <line x1="138" y1="138" x2="142" y2="138" stroke="#b0bec5" stroke-width="0.4"/>
    <line x1="138" y1="140" x2="142" y2="140" stroke="#b0bec5" stroke-width="0.4"/>
    <line x1="138" y1="142" x2="142" y2="142" stroke="#b0bec5" stroke-width="0.4"/>
    <line x1="138" y1="144" x2="142" y2="144" stroke="#b0bec5" stroke-width="0.4"/>
    <line x1="138" y1="146" x2="142" y2="146" stroke="#b0bec5" stroke-width="0.4"/>
    <line x1="138" y1="148" x2="142" y2="148" stroke="#b0bec5" stroke-width="0.4"/>
    <line x1="138" y1="150" x2="142" y2="150" stroke="#b0bec5" stroke-width="0.4"/>
    <line x1="138" y1="152" x2="142" y2="152" stroke="#b0bec5" stroke-width="0.4"/>

    <!-- Screw threads engaging far cortex -->
    <line x1="137.5" y1="154" x2="142.5" y2="154" stroke="#90a4ae" stroke-width="0.5"/>
    <line x1="137.5" y1="156" x2="142.5" y2="156" stroke="#90a4ae" stroke-width="0.5"/>
    <line x1="137.5" y1="158" x2="142.5" y2="158" stroke="#90a4ae" stroke-width="0.5"/>
    <line x1="137.5" y1="160" x2="142.5" y2="160" stroke="#90a4ae" stroke-width="0.5"/>

    <!-- Screw tip (self-tapping tip emerging from far cortex) -->
    <path d="M 138.8,162 L 140,166 L 141.2,162 Z" fill="#90a4ae" stroke="#78909c" stroke-width="0.3"/>

    <!-- Thread engagement highlight in cortices -->
    <rect x="136.5" y="111" width="7" height="9" fill="none" stroke="#7b1fa2" stroke-width="0.4" stroke-dasharray="1,1" opacity="0.5" rx="1"/>
    <rect x="136.5" y="154" width="7" height="10" fill="none" stroke="#7b1fa2" stroke-width="0.4" stroke-dasharray="1,1" opacity="0.5" rx="1"/>
  </g>

  <!-- Screwdriver -->
  <g>
    <!-- Driver tip (hexagonal, engaging screw head) -->
    <rect x="139" y="88" width="2" height="11" fill="#546e7a" stroke="#37474f" stroke-width="0.4"/>

    <!-- Driver shaft -->
    <rect x="137.5" y="30" width="5" height="58" rx="1" fill="url(#driverGrad)" stroke="#455a64" stroke-width="0.5"/>

    <!-- Knurled grip section -->
    <rect x="136" y="28" width="8" height="14" rx="2" fill="#78909c" stroke="#455a64" stroke-width="0.5"/>
    <!-- Knurling lines -->
    <line x1="137" y1="30" x2="143" y2="30" stroke="#546e7a" stroke-width="0.3"/>
    <line x1="137" y1="32" x2="143" y2="32" stroke="#546e7a" stroke-width="0.3"/>
    <line x1="137" y1="34" x2="143" y2="34" stroke="#546e7a" stroke-width="0.3"/>
    <line x1="137" y1="36" x2="143" y2="36" stroke="#546e7a" stroke-width="0.3"/>
    <line x1="137" y1="38" x2="143" y2="38" stroke="#546e7a" stroke-width="0.3"/>
    <line x1="137" y1="40" x2="143" y2="40" stroke="#546e7a" stroke-width="0.3"/>

    <!-- Handle top -->
    <rect x="134" y="22" width="12" height="8" rx="3" fill="#546e7a" stroke="#37474f" stroke-width="0.5"/>
  </g>

  <!-- Rotation arrow on screwdriver -->
  <path d="M 150,50 Q 155,46 155,40 Q 155,34 150,30" fill="none" stroke="#7b1fa2" stroke-width="0.8"/>
  <polygon points="150,29 152,32 148,32" fill="#7b1fa2"/>

  <!-- Bicortical purchase indicators -->
  <!-- Near cortex engagement bracket -->
  <path d="M 130,110 L 126,110 L 126,120 L 130,120" fill="none" stroke="#7b1fa2" stroke-width="0.6"/>
  <!-- Far cortex engagement bracket -->
  <path d="M 130,154 L 126,154 L 126,164 L 130,164" fill="none" stroke="#7b1fa2" stroke-width="0.6"/>

  <!-- Labels -->
  <style>
    .label { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 7px; fill: #37474f; }
    .label-line { stroke: #546e7a; stroke-width: 0.5; stroke-dasharray: 1,1; }
  </style>

  <text x="155" y="40" class="label" font-size="6" fill="#7b1fa2">Rotation</text>

  <text x="155" y="30" class="label">Screwdriver</text>
  <line x1="154" y1="30" x2="148" y2="35" class="label-line"/>

  <text x="155" y="99" class="label">Screw head</text>
  <line x1="154" y1="99" x2="146" y2="99" class="label-line"/>

  <text x="8" y="100" class="label">DCP plate</text>
  <line x1="36" y1="99" x2="40" y2="100" class="label-line"/>

  <text x="108" y="117" class="label" font-size="6.5" fill="#7b1fa2">Near cortex</text>
  <text x="108" y="123" class="label" font-size="5.5" fill="#7b1fa2">engagement</text>

  <text x="108" y="157" class="label" font-size="6.5" fill="#7b1fa2">Far cortex</text>
  <text x="108" y="163" class="label" font-size="5.5" fill="#7b1fa2">engagement</text>

  <text x="8" y="140" class="label">Medullary canal</text>

  <text x="148" y="168" class="label" font-size="6">Screw tip</text>
  <line x1="147" y1="167" x2="143" y2="166" class="label-line"/>

  <text x="155" y="110" class="label" font-size="6">Thread purchase</text>

  <!-- Bicortical fixation indicator -->
  <text x="140" y="186" text-anchor="middle" class="label" font-size="6.5" fill="#7b1fa2" font-style="italic">Bicortical screw fixation</text>
</svg>