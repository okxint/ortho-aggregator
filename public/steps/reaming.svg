<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="280" y2="200"><stop offset="0%" stop-color="#FFF7ED"/><stop offset="100%" stop-color="#FFEDD5"/></linearGradient>
  </defs>
  <rect width="280" height="200" rx="12" fill="url(#bg7)"/>
  <!-- Long bone cross-section -->
  <path d="M40 80 L40 130 Q40 150 55 150 L225 150 Q240 150 240 130 L240 80 Q240 60 225 60 L55 60 Q40 60 40 80Z" fill="#F5E6D3" stroke="#D4A574" stroke-width="1.5"/>
  <!-- Medullary canal -->
  <rect x="60" y="80" width="160" height="50" rx="8" fill="#FEF3C7" stroke="#D4A574" stroke-width="0.8"/>
  <!-- Reamer inside canal -->
  <g transform="translate(140, 105)">
    <!-- Reamer shaft -->
    <rect x="-80" y="-4" width="160" height="8" rx="2" fill="#94A3B8"/>
    <!-- Reamer head -->
    <circle cx="80" cy="0" r="16" fill="none" stroke="#64748B" stroke-width="2"/>
    <circle cx="80" cy="0" r="12" fill="none" stroke="#94A3B8" stroke-width="1"/>
    <!-- Cutting flutes -->
    <path d="M68 -8 L80 0 L68 8" stroke="#475569" stroke-width="1.5" fill="none"/>
    <path d="M74 -12 L88 0 L74 12" stroke="#475569" stroke-width="1" fill="none"/>
    <!-- Rotation -->
    <path d="M100 -10 A14 14 0 0 1 100 10" stroke="#EA580C" stroke-width="1.5" fill="none" marker-end="url(#arr7)"/>
  </g>
  <!-- Guide wire -->
  <line x1="55" y1="105" x2="260" y2="105" stroke="#F59E0B" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="256" y="98" font-family="system-ui,sans-serif" font-size="7" fill="#D97706">Guide wire</text>
  <!-- Size label -->
  <g transform="translate(180, 35)">
    <rect x="0" y="0" width="80" height="22" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <text x="40" y="15" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="600" fill="#475569">Ream +1.5mm</text>
  </g>
  <marker id="arr7" viewBox="0 0 6 6" refX="6" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#EA580C"/></marker>
  <rect x="70" y="160" width="140" height="26" rx="8" fill="white" fill-opacity="0.9"/>
  <text x="140" y="177" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#C2410C">Canal Reaming</text>
</svg>