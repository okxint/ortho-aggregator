<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="280" y2="200"><stop offset="0%" stop-color="#FDF2F8"/><stop offset="100%" stop-color="#FCE7F3"/></linearGradient>
  </defs>
  <rect width="280" height="200" rx="12" fill="url(#bg4)"/>
  <!-- Bone -->
  <rect x="40" y="100" width="200" height="40" rx="10" fill="#F5E6D3" stroke="#D4A574" stroke-width="1.5"/>
  <!-- Plate on bone -->
  <rect x="50" y="88" width="180" height="14" rx="3" fill="#94A3B8" stroke="#64748B" stroke-width="1.5"/>
  <!-- Inserted screws -->
  <g>
    <circle cx="80" cy="95" r="4" fill="#CBD5E1" stroke="#475569" stroke-width="1"/>
    <line x1="80" y1="102" x2="80" y2="130" stroke="#475569" stroke-width="2.5"/>
    <circle cx="120" cy="95" r="4" fill="#CBD5E1" stroke="#475569" stroke-width="1"/>
    <line x1="120" y1="102" x2="120" y2="130" stroke="#475569" stroke-width="2.5"/>
    <circle cx="200" cy="95" r="4" fill="#CBD5E1" stroke="#475569" stroke-width="1"/>
    <line x1="200" y1="102" x2="200" y2="130" stroke="#475569" stroke-width="2.5"/>
  </g>
  <!-- Screwdriver inserting screw -->
  <g transform="translate(160, 95)">
    <circle cx="0" cy="0" r="4" fill="#CBD5E1" stroke="#475569" stroke-width="1"/>
    <rect x="-3" y="-65" width="6" height="60" rx="2" fill="#64748B"/>
    <rect x="-6" y="-75" width="12" height="14" rx="3" fill="#475569"/>
    <!-- Rotation arrow -->
    <path d="M12 -30 A12 12 0 0 1 -8 -42" stroke="#EC4899" stroke-width="1.5" fill="none" marker-end="url(#arr4)"/>
  </g>
  <!-- Torque indicator -->
  <g transform="translate(195, 35)">
    <rect x="0" y="0" width="60" height="24" rx="6" fill="white" stroke="#E2E8F0" stroke-width="1"/>
    <text x="30" y="16" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="600" fill="#475569">Torque: 4Nm</text>
  </g>
  <!-- Check marks on inserted screws -->
  <g fill="#22C55E">
    <circle cx="80" cy="80" r="6" fill="#22C55E" opacity="0.15"/>
    <path d="M76 80 L79 83 L84 77" stroke="#22C55E" stroke-width="1.5" fill="none"/>
    <circle cx="120" cy="80" r="6" fill="#22C55E" opacity="0.15"/>
    <path d="M116 80 L119 83 L124 77" stroke="#22C55E" stroke-width="1.5" fill="none"/>
    <circle cx="200" cy="80" r="6" fill="#22C55E" opacity="0.15"/>
    <path d="M196 80 L199 83 L204 77" stroke="#22C55E" stroke-width="1.5" fill="none"/>
  </g>
  <marker id="arr4" viewBox="0 0 6 6" refX="6" refY="3" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#EC4899"/></marker>
  <rect x="70" y="160" width="140" height="26" rx="8" fill="white" fill-opacity="0.9"/>
  <text x="140" y="177" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#9D174D">Screw Fixation</text>
</svg>