<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <defs>
    <linearGradient id="orangeBgSc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a3a1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c06020;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cortI" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8d4a8"/>
      <stop offset="100%" style="stop-color:#d4c090"/>
    </linearGradient>
    <linearGradient id="screwSteel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e4e8"/>
      <stop offset="50%" style="stop-color:#c0c8d8"/>
      <stop offset="100%" style="stop-color:#e0e4e8"/>
    </linearGradient>
  </defs>
  <rect width="280" height="200" fill="url(#orangeBgSc)"/>

  <!-- Bone cross-section -->
  <!-- Near cortex -->
  <rect x="30" y="45" width="220" height="18" rx="1" fill="url(#cortI)" stroke="#c4a870" stroke-width="1.2"/>
  <!-- Cancellous -->
  <rect x="30" y="63" width="220" height="74" fill="#f0e4c8" stroke="none"/>
  <g opacity="0.3">
    <circle cx="65" cy="82" r="3" fill="none" stroke="#d4c4a0" stroke-width="0.5"/>
    <circle cx="95" cy="95" r="4" fill="none" stroke="#d4c4a0" stroke-width="0.5"/>
    <circle cx="185" cy="85" r="3.5" fill="none" stroke="#d4c4a0" stroke-width="0.5"/>
    <circle cx="215" cy="100" r="3" fill="none" stroke="#d4c4a0" stroke-width="0.5"/>
    <circle cx="75" cy="115" r="3" fill="none" stroke="#d4c4a0" stroke-width="0.5"/>
    <circle cx="195" cy="110" r="4" fill="none" stroke="#d4c4a0" stroke-width="0.5"/>
  </g>
  <!-- Far cortex -->
  <rect x="30" y="137" width="220" height="18" rx="1" fill="url(#cortI)" stroke="#c4a870" stroke-width="1.2"/>

  <!-- Cortical screw fully inserted -->
  <g id="corticalScrew">
    <!-- Screw head (flush with near cortex surface) -->
    <ellipse cx="140" cy="45" rx="8" ry="2" fill="#d0d4d8" stroke="#a0a8b0" stroke-width="0.8"/>
    <!-- Hex recess in head -->
    <path d="M137,44 L139,43 L141,43 L143,44 L141,45 L139,45Z" fill="#808890" stroke="#707880" stroke-width="0.3"/>
    <!-- Head countersink into cortex -->
    <path d="M132,46 L135,44 L140,43 L145,44 L148,46" fill="none" stroke="#b8a480" stroke-width="0.5" opacity="0.5"/>

    <!-- Screw shaft with threads engaging both cortices -->
    <rect x="137" y="45" width="6" height="112" rx="0.5" fill="url(#screwSteel)" stroke="#a0a8b8" stroke-width="0.5"/>

    <!-- Thread pattern - full cortical screw threads -->
    <g stroke="#909aa8" stroke-width="0.6" fill="none">
      <!-- Near cortex engagement -->
      <path d="M135,48 L145,52"/>
      <path d="M135,52 L145,56"/>
      <path d="M135,56 L145,60"/>
      <!-- Cancellous zone -->
      <path d="M135,64 L145,68"/>
      <path d="M135,68 L145,72"/>
      <path d="M135,72 L145,76"/>
      <path d="M135,76 L145,80"/>
      <path d="M135,80 L145,84"/>
      <path d="M135,84 L145,88"/>
      <path d="M135,88 L145,92"/>
      <path d="M135,92 L145,96"/>
      <path d="M135,96 L145,100"/>
      <path d="M135,100 L145,104"/>
      <path d="M135,104 L145,108"/>
      <path d="M135,108 L145,112"/>
      <path d="M135,112 L145,116"/>
      <path d="M135,116 L145,120"/>
      <path d="M135,120 L145,124"/>
      <path d="M135,124 L145,128"/>
      <path d="M135,128 L145,132"/>
      <!-- Far cortex engagement -->
      <path d="M135,136 L145,140"/>
      <path d="M135,140 L145,144"/>
      <path d="M135,144 L145,148"/>
      <path d="M135,148 L145,152"/>
    </g>

    <!-- Screw tip just past far cortex (1-2mm purchase) -->
    <path d="M138,155 L140,160 L142,155" fill="#d0d4d8" stroke="#a0a8b0" stroke-width="0.4"/>
  </g>

  <!-- Thread engagement zones highlighted -->
  <!-- Near cortex engagement zone -->
  <rect x="128" y="45" width="24" height="18" fill="none" stroke="#ff8844" stroke-width="1" stroke-dasharray="2,2" opacity="0.5" rx="2"/>
  <!-- Far cortex engagement zone -->
  <rect x="128" y="137" width="24" height="18" fill="none" stroke="#ff8844" stroke-width="1" stroke-dasharray="2,2" opacity="0.5" rx="2"/>

  <!-- Screwdriver -->
  <g id="screwdriver" transform="translate(140,30)">
    <!-- Shaft -->
    <rect x="-3" y="-22" width="6" height="20" rx="1" fill="#909aa0" stroke="#707880" stroke-width="0.5"/>
    <!-- Handle -->
    <rect x="-6" y="-38" width="12" height="18" rx="3" fill="#505860" stroke="#404850" stroke-width="0.6"/>
    <!-- Hex tip engaging screw -->
    <path d="M-1.5,0 L-1.5,-3 L1.5,-3 L1.5,0" fill="#808890" stroke="#606870" stroke-width="0.3"/>
  </g>

  <!-- Rotation indicator -->
  <path d="M155,15 Q162,8 162,20" fill="none" stroke="#ffaa44" stroke-width="1" opacity="0.5"/>
  <polygon points="162,20 159,16 165,17" fill="#ffaa44" opacity="0.5"/>

  <!-- Plate on top of bone (optional context showing screw through plate) -->
  <rect x="90" y="38" width="100" height="7" rx="2" fill="#b0b8c8" stroke="#8898a8" stroke-width="0.8"/>
  <!-- Plate hole -->
  <ellipse cx="140" cy="41.5" rx="5" ry="2.5" fill="#6a3a1a" stroke="#8898a8" stroke-width="0.3" opacity="0.5"/>

  <!-- Labels -->
  <text x="255" y="55" fill="#f0d8c0" font-size="7" font-family="Arial">Near</text>
  <text x="255" y="63" fill="#f0d8c0" font-size="7" font-family="Arial">cortex</text>
  <text x="255" y="100" fill="#f0d8c0" font-size="7" font-family="Arial">Cancellous</text>
  <text x="255" y="145" fill="#f0d8c0" font-size="7" font-family="Arial">Far</text>
  <text x="255" y="153" fill="#f0d8c0" font-size="7" font-family="Arial">cortex</text>
  <text x="15" y="20" fill="#f0d8c0" font-size="7" font-family="Arial">Screwdriver</text>
  <text x="15" y="42" fill="#f0d8c0" font-size="7" font-family="Arial">Plate</text>
  <line x1="28" y1="40" x2="90" y2="41" stroke="#f0d8c0" stroke-width="0.3" opacity="0.5"/>
  <text x="15" y="55" fill="#ff8844" font-size="7" font-family="Arial">Head flush</text>
  <text x="15" y="63" fill="#ff8844" font-size="7" font-family="Arial">with surface</text>
  <line x1="52" y1="58" x2="132" y2="46" stroke="#ff8844" stroke-width="0.3" opacity="0.5"/>
  <text x="15" y="100" fill="#f0d8c0" font-size="7" font-family="Arial">Bicortical</text>
  <text x="15" y="108" fill="#f0d8c0" font-size="7" font-family="Arial">purchase</text>
  <text x="15" y="150" fill="#ff8844" font-size="7" font-family="Arial">Threads in</text>
  <text x="15" y="158" fill="#ff8844" font-size="7" font-family="Arial">far cortex</text>
  <line x1="50" y1="154" x2="128" y2="148" stroke="#ff8844" stroke-width="0.3" opacity="0.5"/>
  <text x="15" y="170" fill="#f0d8c0" font-size="6.5" font-family="Arial">Tip 1-2mm</text>
  <text x="15" y="178" fill="#f0d8c0" font-size="6.5" font-family="Arial">past cortex</text>
  <line x1="50" y1="174" x2="138" y2="160" stroke="#f0d8c0" stroke-width="0.3" opacity="0.5"/>

  <text x="140" y="195" fill="#f0d8c0" font-size="7.5" font-family="Arial" text-anchor="middle" font-weight="bold">Cortical Screw - Bicortical Fixation</text>
</svg>