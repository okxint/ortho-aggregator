<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <defs>
    <linearGradient id="greenBgSc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4a2a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2a7a4a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="boneM" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e6c8"/>
      <stop offset="100%" style="stop-color:#e8d4a8"/>
    </linearGradient>
    <linearGradient id="cortM" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8d4a8"/>
      <stop offset="100%" style="stop-color:#d4c090"/>
    </linearGradient>
    <linearGradient id="steelM" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d0d4d8"/>
      <stop offset="50%" style="stop-color:#b0b8c8"/>
      <stop offset="100%" style="stop-color:#d0d4d8"/>
    </linearGradient>
  </defs>
  <rect width="280" height="200" fill="url(#greenBgSc)"/>

  <!-- Bone cross-section -->
  <!-- Near cortex -->
  <rect x="30" y="45" width="220" height="18" rx="1" fill="url(#cortM)" stroke="#c4a870" stroke-width="1.2"/>
  <!-- Cancellous -->
  <rect x="30" y="63" width="220" height="74" fill="#f0e4c8" stroke="none"/>
  <g opacity="0.3">
    <circle cx="60" cy="80" r="3" fill="none" stroke="#d4c4a0" stroke-width="0.5"/>
    <circle cx="90" cy="95" r="4" fill="none" stroke="#d4c4a0" stroke-width="0.5"/>
    <circle cx="120" cy="78" r="3.5" fill="none" stroke="#d4c4a0" stroke-width="0.5"/>
    <circle cx="160" cy="90" r="3" fill="none" stroke="#d4c4a0" stroke-width="0.5"/>
    <circle cx="200" cy="82" r="3.5" fill="none" stroke="#d4c4a0" stroke-width="0.5"/>
    <circle cx="80" cy="115" r="3" fill="none" stroke="#d4c4a0" stroke-width="0.5"/>
    <circle cx="140" cy="108" r="4" fill="none" stroke="#d4c4a0" stroke-width="0.5"/>
    <circle cx="210" cy="110" r="3" fill="none" stroke="#d4c4a0" stroke-width="0.5"/>
  </g>
  <!-- Far cortex -->
  <rect x="30" y="137" width="220" height="18" rx="1" fill="url(#cortM)" stroke="#c4a870" stroke-width="1.2"/>

  <!-- Drill hole through both cortices -->
  <rect x="137.5" y="45" width="5" height="110" fill="#1a4a2a" opacity="0.3" stroke="none"/>

  <!-- Depth gauge -->
  <g id="depthGauge">
    <!-- Main shaft -->
    <line x1="140" y1="8" x2="140" y2="160" stroke="url(#steelM)" stroke-width="3"/>
    <line x1="140" y1="8" x2="140" y2="160" stroke="#d0d8e0" stroke-width="1.5"/>

    <!-- Hook at far cortex (catching the far cortex from inside) -->
    <path d="M140,155 L140,162 Q140,168 135,168 L130,168 Q126,168 126,164 L126,158"
          fill="none" stroke="#c0c8d0" stroke-width="2"/>
    <!-- Hook tip touching far cortex underside -->
    <circle cx="126" cy="158" r="1.5" fill="#d0d8e0" stroke="#a0a8b0" stroke-width="0.5"/>

    <!-- Measurement markings on shaft -->
    <g fill="none" stroke="#404850" stroke-width="0.5">
      <line x1="137" y1="50" x2="143" y2="50"/>
      <line x1="137" y1="55" x2="143" y2="55"/>
      <line x1="136" y1="60" x2="144" y2="60"/>
      <line x1="137" y1="65" x2="143" y2="65"/>
      <line x1="137" y1="70" x2="143" y2="70"/>
      <line x1="136" y1="75" x2="144" y2="75"/>
      <line x1="137" y1="80" x2="143" y2="80"/>
      <line x1="137" y1="85" x2="143" y2="85"/>
      <line x1="136" y1="90" x2="144" y2="90"/>
      <line x1="137" y1="95" x2="143" y2="95"/>
      <line x1="137" y1="100" x2="143" y2="100"/>
      <line x1="136" y1="105" x2="144" y2="105"/>
      <line x1="137" y1="110" x2="143" y2="110"/>
      <line x1="137" y1="115" x2="143" y2="115"/>
      <line x1="136" y1="120" x2="144" y2="120"/>
      <line x1="137" y1="125" x2="143" y2="125"/>
      <line x1="137" y1="130" x2="143" y2="130"/>
      <line x1="136" y1="135" x2="144" y2="135"/>
    </g>

    <!-- Handle at top -->
    <rect x="132" y="5" width="16" height="12" rx="2" fill="#808890" stroke="#606870" stroke-width="0.8"/>
    <!-- Sliding collar/indicator at near cortex level -->
    <rect x="133" y="42" width="14" height="6" rx="1" fill="#909aa0" stroke="#707880" stroke-width="0.8"/>
  </g>

  <!-- Measurement dimension line -->
  <line x1="160" y1="45" x2="160" y2="155" stroke="#88ff88" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.6"/>
  <line x1="155" y1="45" x2="165" y2="45" stroke="#88ff88" stroke-width="0.8" opacity="0.6"/>
  <line x1="155" y1="155" x2="165" y2="155" stroke="#88ff88" stroke-width="0.8" opacity="0.6"/>
  <!-- Measurement reading -->
  <rect x="165" y="92" width="30" height="14" rx="2" fill="rgba(0,0,0,0.3)" stroke="#88ff88" stroke-width="0.5"/>
  <text x="180" y="103" fill="#88ff88" font-size="8" font-family="Arial" text-anchor="middle" font-weight="bold">36mm</text>

  <!-- Arrow showing hook catching far cortex -->
  <path d="M115,170 Q120,165 126,160" fill="none" stroke="#ffaa44" stroke-width="1"/>
  <polygon points="126,160 122,162 124,157" fill="#ffaa44" opacity="0.7"/>

  <!-- Labels -->
  <text x="255" y="55" fill="#c0e8d0" font-size="7" font-family="Arial">Near</text>
  <text x="255" y="63" fill="#c0e8d0" font-size="7" font-family="Arial">cortex</text>
  <text x="255" y="100" fill="#c0e8d0" font-size="7" font-family="Arial">Cancellous</text>
  <text x="255" y="145" fill="#c0e8d0" font-size="7" font-family="Arial">Far</text>
  <text x="255" y="153" fill="#c0e8d0" font-size="7" font-family="Arial">cortex</text>
  <text x="15" y="15" fill="#c0e8d0" font-size="7" font-family="Arial">Depth gauge</text>
  <text x="15" y="23" fill="#c0e8d0" font-size="7" font-family="Arial">handle</text>
  <text x="15" y="48" fill="#c0e8d0" font-size="7" font-family="Arial">Sliding collar</text>
  <line x1="55" y1="46" x2="133" y2="45" stroke="#c0e8d0" stroke-width="0.3" opacity="0.5"/>
  <text x="15" y="100" fill="#c0e8d0" font-size="7" font-family="Arial">Graduated</text>
  <text x="15" y="108" fill="#c0e8d0" font-size="7" font-family="Arial">markings</text>
  <line x1="50" y1="104" x2="136" y2="100" stroke="#c0e8d0" stroke-width="0.3" opacity="0.5"/>
  <text x="75" y="175" fill="#ffaa44" font-size="7" font-family="Arial">Hook catches</text>
  <text x="75" y="183" fill="#ffaa44" font-size="7" font-family="Arial">far cortex</text>

  <text x="140" y="195" fill="#c0e8d0" font-size="7.5" font-family="Arial" text-anchor="middle" font-weight="bold">Depth Gauge Measurement</text>
</svg>