<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <defs>
    <linearGradient id="orangeBgS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6a3a1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c06020;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="boneSF" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5e6c8"/>
      <stop offset="100%" style="stop-color:#e8d4a8"/>
    </linearGradient>
    <linearGradient id="cage" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d0d8e0"/>
      <stop offset="100%" style="stop-color:#a8b0c0"/>
    </linearGradient>
    <linearGradient id="graft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e0c8"/>
      <stop offset="100%" style="stop-color:#c8b898"/>
    </linearGradient>
  </defs>
  <rect width="280" height="200" fill="url(#orangeBgS)"/>

  <!-- Lateral view of two vertebral bodies with interbody cage -->

  <!-- Upper vertebral body (L4) -->
  <g id="upperVert">
    <path d="M55,30 L55,70 Q55,75 60,78 L200,78 Q205,75 205,70 L205,30 Q205,25 200,22 L60,22 Q55,25 55,30Z"
          fill="url(#boneSF)" stroke="#c4a870" stroke-width="1.2"/>
    <!-- Endplate (inferior) -->
    <line x1="60" y1="78" x2="200" y2="78" stroke="#c4a870" stroke-width="1.5"/>
    <!-- Cancellous bone texture -->
    <circle cx="90" cy="50" r="2" fill="none" stroke="#d4c4a0" stroke-width="0.3" opacity="0.4"/>
    <circle cx="120" cy="45" r="2.5" fill="none" stroke="#d4c4a0" stroke-width="0.3" opacity="0.4"/>
    <circle cx="150" cy="52" r="2" fill="none" stroke="#d4c4a0" stroke-width="0.3" opacity="0.4"/>
    <circle cx="175" cy="48" r="2.5" fill="none" stroke="#d4c4a0" stroke-width="0.3" opacity="0.4"/>
    <circle cx="100" cy="60" r="1.8" fill="none" stroke="#d4c4a0" stroke-width="0.3" opacity="0.4"/>
    <circle cx="140" cy="62" r="2" fill="none" stroke="#d4c4a0" stroke-width="0.3" opacity="0.4"/>
    <circle cx="180" cy="60" r="1.5" fill="none" stroke="#d4c4a0" stroke-width="0.3" opacity="0.4"/>
    <!-- Posterior elements hint -->
    <path d="M55,40 L42,38 Q38,40 40,45 L55,48" fill="url(#boneSF)" stroke="#c4a870" stroke-width="0.8"/>
    <!-- Pedicle screw in upper body -->
    <line x1="52" y1="50" x2="30" y2="48" stroke="#a0a8b8" stroke-width="3"/>
    <rect x="25" y="44" width="8" height="10" rx="1" fill="#c0c8d0" stroke="#808890" stroke-width="0.5"/>
  </g>

  <!-- Disc space / interbody area -->
  <!-- Disc space -->
  <rect x="60" y="78" width="140" height="28" fill="#6a3a1a" opacity="0.3" stroke="none"/>

  <!-- Interbody cage being inserted -->
  <g id="interbodyCage">
    <!-- Cage body (PEEK or titanium) -->
    <path d="M95,80 L185,80 Q190,82 190,85 L190,100 Q190,103 185,105 L95,105 Q90,103 90,100 L90,85 Q90,82 95,80Z"
          fill="url(#cage)" stroke="#808890" stroke-width="1"/>
    <!-- Cage windows/openings (for bone graft) -->
    <rect x="100" y="84" width="18" height="17" rx="2" fill="url(#graft)" stroke="#909aa0" stroke-width="0.5"/>
    <rect x="125" y="84" width="18" height="17" rx="2" fill="url(#graft)" stroke="#909aa0" stroke-width="0.5"/>
    <rect x="150" y="84" width="18" height="17" rx="2" fill="url(#graft)" stroke="#909aa0" stroke-width="0.5"/>
    <!-- Cage teeth/serrations on top and bottom -->
    <path d="M95,80 L100,79 L105,80 L110,79 L115,80 L120,79 L125,80 L130,79 L135,80 L140,79 L145,80 L150,79 L155,80 L160,79 L165,80 L170,79 L175,80 L180,79 L185,80"
          fill="none" stroke="#a0a8b8" stroke-width="0.5"/>
    <path d="M95,105 L100,106 L105,105 L110,106 L115,105 L120,106 L125,105 L130,106 L135,105 L140,106 L145,105 L150,106 L155,105 L160,106 L165,105 L170,106 L175,105 L180,106 L185,105"
          fill="none" stroke="#a0a8b8" stroke-width="0.5"/>
    <!-- Bone graft granules inside cage -->
    <circle cx="108" cy="90" r="1.5" fill="#d8d0b0" stroke="#c0b898" stroke-width="0.3"/>
    <circle cx="112" cy="95" r="1" fill="#d8d0b0" stroke="#c0b898" stroke-width="0.3"/>
    <circle cx="106" cy="97" r="1.2" fill="#d8d0b0" stroke="#c0b898" stroke-width="0.3"/>
    <circle cx="133" cy="89" r="1.5" fill="#d8d0b0" stroke="#c0b898" stroke-width="0.3"/>
    <circle cx="137" cy="95" r="1" fill="#d8d0b0" stroke="#c0b898" stroke-width="0.3"/>
    <circle cx="130" cy="96" r="1.2" fill="#d8d0b0" stroke="#c0b898" stroke-width="0.3"/>
    <circle cx="158" cy="90" r="1.5" fill="#d8d0b0" stroke="#c0b898" stroke-width="0.3"/>
    <circle cx="162" cy="95" r="1" fill="#d8d0b0" stroke="#c0b898" stroke-width="0.3"/>
    <circle cx="155" cy="97" r="1.2" fill="#d8d0b0" stroke="#c0b898" stroke-width="0.3"/>
  </g>

  <!-- Cage inserter tool -->
  <g id="cageInserter">
    <rect x="190" y="88" width="50" height="6" rx="1.5" fill="#909aa0" stroke="#707880" stroke-width="0.6"/>
    <rect x="238" y="85" width="20" height="12" rx="3" fill="#808890" stroke="#606870" stroke-width="0.6"/>
    <!-- Grip prongs -->
    <path d="M190,89 L186,87 L186,95 L190,93" fill="#a0a8b0" stroke="#808890" stroke-width="0.4"/>
    <!-- Arrow showing insertion direction -->
    <path d="M215,82 L205,82 L205,78 L195,85 L205,92 L205,88 L215,88Z" fill="#ff8844" opacity="0.4"/>
  </g>

  <!-- Lower vertebral body (L5) -->
  <g id="lowerVert">
    <path d="M55,108 L55,148 Q55,153 60,156 L200,156 Q205,153 205,148 L205,108 Q205,103 200,100 L60,100 Q55,103 55,108Z"
          fill="url(#boneSF)" stroke="#c4a870" stroke-width="1.2"/>
    <line x1="60" y1="100" x2="200" y2="100" stroke="#c4a870" stroke-width="1.5"/>
    <circle cx="90" cy="125" r="2" fill="none" stroke="#d4c4a0" stroke-width="0.3" opacity="0.4"/>
    <circle cx="120" cy="120" r="2.5" fill="none" stroke="#d4c4a0" stroke-width="0.3" opacity="0.4"/>
    <circle cx="150" cy="128" r="2" fill="none" stroke="#d4c4a0" stroke-width="0.3" opacity="0.4"/>
    <circle cx="175" cy="122" r="2.5" fill="none" stroke="#d4c4a0" stroke-width="0.3" opacity="0.4"/>
    <path d="M55,118 L42,116 Q38,118 40,123 L55,126" fill="url(#boneSF)" stroke="#c4a870" stroke-width="0.8"/>
    <!-- Pedicle screw in lower body -->
    <line x1="52" y1="128" x2="30" y2="126" stroke="#a0a8b8" stroke-width="3"/>
    <rect x="25" y="122" width="8" height="10" rx="1" fill="#c0c8d0" stroke="#808890" stroke-width="0.5"/>
  </g>

  <!-- Connecting rod on pedicle screws -->
  <rect x="28" y="46" width="3" height="84" rx="1.5" fill="#c0c8d0" stroke="#909aa0" stroke-width="0.5"/>

  <!-- Bone graft material being packed -->
  <g transform="translate(70,82)">
    <circle cx="2" cy="2" r="1.5" fill="#d8d0b0" stroke="#c0b898" stroke-width="0.3" opacity="0.6"/>
    <circle cx="6" cy="4" r="1" fill="#d8d0b0" stroke="#c0b898" stroke-width="0.3" opacity="0.6"/>
    <circle cx="4" cy="7" r="1.3" fill="#d8d0b0" stroke="#c0b898" stroke-width="0.3" opacity="0.6"/>
  </g>

  <!-- Labels -->
  <text x="70" y="18" fill="#f0d8c0" font-size="7.5" font-family="Arial" font-weight="bold">L4</text>
  <text x="70" y="175" fill="#f0d8c0" font-size="7.5" font-family="Arial" font-weight="bold">L5</text>
  <text x="115" y="15" fill="#f0d8c0" font-size="7" font-family="Arial">Superior vertebral body</text>
  <text x="115" y="175" fill="#f0d8c0" font-size="7" font-family="Arial">Inferior vertebral body</text>
  <text x="105" y="115" fill="#d0d8e0" font-size="6.5" font-family="Arial">Interbody cage (PEEK)</text>
  <text x="105" y="72" fill="#e0d8b0" font-size="6.5" font-family="Arial">Bone graft in windows</text>
  <line x1="140" y1="74" x2="133" y2="84" stroke="#e0d8b0" stroke-width="0.3" opacity="0.5"/>
  <text x="242" y="82" fill="#f0d8c0" font-size="7" font-family="Arial">Inserter</text>
  <text x="10" y="90" fill="#f0d8c0" font-size="7" font-family="Arial">Rod +</text>
  <text x="10" y="98" fill="#f0d8c0" font-size="7" font-family="Arial">screws</text>
  <line x1="30" y1="94" x2="28" y2="80" stroke="#f0d8c0" stroke-width="0.3" opacity="0.5"/>

  <text x="140" y="195" fill="#f0d8c0" font-size="7.5" font-family="Arial" text-anchor="middle" font-weight="bold">Interbody Fusion - PLIF/TLIF Cage Insertion</text>
</svg>