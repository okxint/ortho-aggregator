<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <defs>
    <linearGradient id="purpleBgS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a1a5a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6a3a9a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="boneSR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5e6c8"/>
      <stop offset="100%" style="stop-color:#e8d4a8"/>
    </linearGradient>
    <linearGradient id="steelR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d0d4d8"/>
      <stop offset="100%" style="stop-color:#a0a8b8"/>
    </linearGradient>
    <linearGradient id="rod" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d8dce0"/>
      <stop offset="50%" style="stop-color:#b0b8c8"/>
      <stop offset="100%" style="stop-color:#d8dce0"/>
    </linearGradient>
  </defs>
  <rect width="280" height="200" fill="url(#purpleBgS)"/>

  <!-- Three vertebral levels - posterior view -->
  <!-- L3 -->
  <g id="L3r" transform="translate(140,35)">
    <!-- Laminae -->
    <path d="M-45,0 Q-40,-4 -25,-2 L-6,-1 L-6,7 L-25,6 Q-40,4 -45,8Z" fill="url(#boneSR)" stroke="#c4a870" stroke-width="0.8"/>
    <path d="M45,0 Q40,-4 25,-2 L6,-1 L6,7 L25,6 Q40,4 45,8Z" fill="url(#boneSR)" stroke="#c4a870" stroke-width="0.8"/>
    <!-- Spinous process -->
    <path d="M-4,-1 L-2,-10 Q0,-13 2,-10 L4,-1" fill="url(#boneSR)" stroke="#c4a870" stroke-width="0.8"/>
    <!-- Transverse processes -->
    <path d="M-45,3 L-56,1 Q-60,3 -56,5 L-45,6" fill="url(#boneSR)" stroke="#c4a870" stroke-width="0.6"/>
    <path d="M45,3 L56,1 Q60,3 56,5 L45,6" fill="url(#boneSR)" stroke="#c4a870" stroke-width="0.6"/>
    <!-- Pedicle screw tulips - bilateral -->
    <!-- Left screw -->
    <rect x="-42" y="-6" width="6" height="14" rx="1" fill="url(#steelR)" stroke="#808890" stroke-width="0.8"/>
    <rect x="-43" y="-6" width="8" height="4" rx="1" fill="#c0c8d0" stroke="#808890" stroke-width="0.5"/>
    <!-- Right screw -->
    <rect x="36" y="-6" width="6" height="14" rx="1" fill="url(#steelR)" stroke="#808890" stroke-width="0.8"/>
    <rect x="35" y="-6" width="8" height="4" rx="1" fill="#c0c8d0" stroke="#808890" stroke-width="0.5"/>
  </g>

  <!-- L4 -->
  <g id="L4r" transform="translate(140,85)">
    <path d="M-45,0 Q-40,-4 -25,-2 L-6,-1 L-6,7 L-25,6 Q-40,4 -45,8Z" fill="url(#boneSR)" stroke="#c4a870" stroke-width="0.8"/>
    <path d="M45,0 Q40,-4 25,-2 L6,-1 L6,7 L25,6 Q40,4 45,8Z" fill="url(#boneSR)" stroke="#c4a870" stroke-width="0.8"/>
    <path d="M-4,-1 L-2,-10 Q0,-13 2,-10 L4,-1" fill="url(#boneSR)" stroke="#c4a870" stroke-width="0.8"/>
    <path d="M-45,3 L-56,1 Q-60,3 -56,5 L-45,6" fill="url(#boneSR)" stroke="#c4a870" stroke-width="0.6"/>
    <path d="M45,3 L56,1 Q60,3 56,5 L45,6" fill="url(#boneSR)" stroke="#c4a870" stroke-width="0.6"/>
    <rect x="-42" y="-6" width="6" height="14" rx="1" fill="url(#steelR)" stroke="#808890" stroke-width="0.8"/>
    <rect x="-43" y="-6" width="8" height="4" rx="1" fill="#c0c8d0" stroke="#808890" stroke-width="0.5"/>
    <rect x="36" y="-6" width="6" height="14" rx="1" fill="url(#steelR)" stroke="#808890" stroke-width="0.8"/>
    <rect x="35" y="-6" width="8" height="4" rx="1" fill="#c0c8d0" stroke="#808890" stroke-width="0.5"/>
  </g>

  <!-- L5 -->
  <g id="L5r" transform="translate(140,135)">
    <path d="M-45,0 Q-40,-4 -25,-2 L-6,-1 L-6,7 L-25,6 Q-40,4 -45,8Z" fill="url(#boneSR)" stroke="#c4a870" stroke-width="0.8"/>
    <path d="M45,0 Q40,-4 25,-2 L6,-1 L6,7 L25,6 Q40,4 45,8Z" fill="url(#boneSR)" stroke="#c4a870" stroke-width="0.8"/>
    <path d="M-4,-1 L-2,-10 Q0,-13 2,-10 L4,-1" fill="url(#boneSR)" stroke="#c4a870" stroke-width="0.8"/>
    <path d="M-45,3 L-56,1 Q-60,3 -56,5 L-45,6" fill="url(#boneSR)" stroke="#c4a870" stroke-width="0.6"/>
    <path d="M45,3 L56,1 Q60,3 56,5 L45,6" fill="url(#boneSR)" stroke="#c4a870" stroke-width="0.6"/>
    <rect x="-42" y="-6" width="6" height="14" rx="1" fill="url(#steelR)" stroke="#808890" stroke-width="0.8"/>
    <rect x="-43" y="-6" width="8" height="4" rx="1" fill="#c0c8d0" stroke="#808890" stroke-width="0.5"/>
    <rect x="36" y="-6" width="6" height="14" rx="1" fill="url(#steelR)" stroke="#808890" stroke-width="0.8"/>
    <rect x="35" y="-6" width="8" height="4" rx="1" fill="#c0c8d0" stroke="#808890" stroke-width="0.5"/>
  </g>

  <!-- Connecting rod - LEFT side (already placed) -->
  <rect x="98" y="26" width="4" height="118" rx="2" fill="url(#rod)" stroke="#909aa0" stroke-width="0.8"/>

  <!-- Connecting rod - RIGHT side (being placed, slightly angled) -->
  <g transform="rotate(-3,180,85)">
    <rect x="176" y="20" width="4" height="125" rx="2" fill="url(#rod)" stroke="#909aa0" stroke-width="0.8"/>
  </g>

  <!-- Rod gripper/inserter tool on right rod -->
  <g transform="translate(195,50)">
    <rect x="0" y="-3" width="35" height="6" rx="1.5" fill="#808890" stroke="#606870" stroke-width="0.6"/>
    <rect x="33" y="-5" width="15" height="10" rx="2" fill="#707880" stroke="#505860" stroke-width="0.6"/>
    <!-- Jaws gripping rod -->
    <path d="M0,-3 L-8,-5 L-10,0 L-8,5 L0,3" fill="#909aa0" stroke="#707880" stroke-width="0.5"/>
  </g>

  <!-- Set screws (on left side, already tightened) -->
  <circle cx="100" cy="31" r="2.5" fill="#d0d4d8" stroke="#808890" stroke-width="0.5"/>
  <line x1="98.5" y1="31" x2="101.5" y2="31" stroke="#808890" stroke-width="0.5"/>
  <circle cx="100" cy="81" r="2.5" fill="#d0d4d8" stroke="#808890" stroke-width="0.5"/>
  <line x1="98.5" y1="81" x2="101.5" y2="81" stroke="#808890" stroke-width="0.5"/>
  <circle cx="100" cy="131" r="2.5" fill="#d0d4d8" stroke="#808890" stroke-width="0.5"/>
  <line x1="98.5" y1="131" x2="101.5" y2="131" stroke="#808890" stroke-width="0.5"/>

  <!-- Interspinous gaps -->
  <path d="M140,47 L140,73" fill="none" stroke="#6a3a9a" stroke-width="1" opacity="0.3"/>
  <path d="M140,97 L140,123" fill="none" stroke="#6a3a9a" stroke-width="1" opacity="0.3"/>

  <!-- Labels -->
  <text x="10" y="18" fill="#d0c0e0" font-size="7" font-family="Arial">Set screws</text>
  <line x1="45" y1="16" x2="97" y2="29" stroke="#d0c0e0" stroke-width="0.4" opacity="0.5"/>
  <text x="10" y="38" fill="#d0c0e0" font-size="7" font-family="Arial">Left rod</text>
  <text x="10" y="46" fill="#d0c0e0" font-size="7" font-family="Arial">(seated)</text>
  <line x1="40" y1="42" x2="97" y2="55" stroke="#d0c0e0" stroke-width="0.4" opacity="0.5"/>
  <text x="10" y="90" fill="#d0c0e0" font-size="7" font-family="Arial">Screw tulip</text>
  <line x1="48" y1="88" x2="96" y2="82" stroke="#d0c0e0" stroke-width="0.4" opacity="0.5"/>
  <text x="220" y="40" fill="#d0c0e0" font-size="7" font-family="Arial">Rod inserter</text>
  <text x="220" y="85" fill="#d0c0e0" font-size="7" font-family="Arial">Right rod</text>
  <text x="220" y="93" fill="#d0c0e0" font-size="7" font-family="Arial">(placing)</text>
  <line x1="220" y1="89" x2="182" y2="85" stroke="#d0c0e0" stroke-width="0.4" opacity="0.5"/>
  <text x="230" y="130" fill="#d0c0e0" font-size="7.5" font-family="Arial" font-weight="bold">L3</text>
  <text x="230" y="85" fill="#d0c0e0" font-size="7.5" font-family="Arial" font-weight="bold">L4</text>
  <text x="230" y="40" fill="#d0c0e0" font-size="7.5" font-family="Arial" font-weight="bold">L3</text>

  <text x="140" y="195" fill="#d0c0e0" font-size="7.5" font-family="Arial" text-anchor="middle" font-weight="bold">Rod Placement - L3-L5 Construct</text>
</svg>